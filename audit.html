<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paw Records — Data Audit</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@300;400;500;600&display=swap');
:root {
  --bg:#f5f2ed; --surface:#edeae3; --surface2:#e4e0d8; --border:#d4cfc5;
  --accent:#7c6f5b; --ink:#2a2520; --ink-dim:#6b6058; --ink-muted:#9e9288;
  --green:#4a7c59; --green-bg:#edf5f0;
  --amber:#9c6b1e; --amber-bg:#fdf5e6;
  --red:#c0242a; --red-bg:#fdf0f0;
  --blue:#0d47a1; --blue-bg:#eef3fa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--ink);min-height:100vh;padding:2rem;}
h1{font-family:'Instrument Serif',serif;font-size:1.5rem;font-weight:400;color:var(--accent);margin-bottom:0.25rem;}
.subtitle{font-size:0.7rem;color:var(--ink-muted);margin-bottom:2rem;}

#signin-section{max-width:400px;margin:4rem auto;text-align:center;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:0.75rem;width:100%;background:white;border:1.5px solid var(--border);border-radius:10px;padding:0.85rem 1.25rem;font-family:'JetBrains Mono',monospace;font-size:0.88rem;color:var(--ink);cursor:pointer;transition:all 0.2s;box-shadow:0 2px 12px rgba(42,37,32,0.08);margin-top:2rem;}
.btn-google:hover{border-color:var(--accent);background:var(--surface);}
.btn-google svg{width:18px;height:18px;flex-shrink:0;}

#audit-section{display:none;max-width:1040px;margin:0 auto;}
.header-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:1rem;}
.btn{background:var(--accent);color:white;border:none;border-radius:8px;padding:0.55rem 1.1rem;font-family:'JetBrains Mono',monospace;font-size:0.72rem;cursor:pointer;transition:all 0.15s;}
.btn:hover{background:var(--ink);}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn.secondary{background:var(--surface);color:var(--ink-dim);border:1px solid var(--border);}
.btn.secondary:hover{background:var(--surface2);color:var(--ink);}
.btn.green{background:var(--green);color:white;border:none;}
.btn.green:hover{background:#3a6648;}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.85rem;margin-bottom:2rem;}
.card{background:white;border:1px solid var(--border);border-radius:10px;padding:0.85rem 1rem;}
.card-label{font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:0.3rem;}
.card-value{font-size:1.5rem;font-weight:600;color:var(--ink);line-height:1;}
.card-sub{font-size:0.6rem;color:var(--ink-muted);margin-top:0.2rem;}
.card.warn .card-value{color:var(--amber);}
.card.alert .card-value{color:var(--red);}
.card.good .card-value{color:var(--green);}

.section{background:white;border:1px solid var(--border);border-radius:10px;margin-bottom:1.25rem;overflow:hidden;}
.section-header{padding:0.7rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.section-header:hover{background:var(--surface);}
.section-title{font-size:0.78rem;font-weight:600;color:var(--ink);}
.section-meta{display:flex;align-items:center;gap:0.75rem;}
.section-count{font-size:0.63rem;}
.section-arrow{font-size:0.5rem;color:var(--ink-muted);transition:transform 0.2s;}
.section-header.open .section-arrow{transform:rotate(90deg);}
.section-body{display:none;}
.section-body.open{display:block;}

table{width:100%;border-collapse:collapse;font-size:0.63rem;}
th{text-align:left;padding:0.45rem 0.9rem;background:var(--surface);color:var(--ink-muted);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;font-size:0.56rem;border-bottom:1px solid var(--border);}
td{padding:0.4rem 0.9rem;border-bottom:1px solid var(--surface2);color:var(--ink-dim);vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface);}

.progress-wrap{margin-bottom:1.5rem;}
.progress-bar-bg{background:var(--surface2);border-radius:4px;height:5px;overflow:hidden;}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width 0.3s;width:0%;}
.progress-label{font-size:0.63rem;color:var(--ink-muted);margin-top:0.35rem;}
.empty-note{padding:1.25rem;font-size:0.65rem;color:var(--ink-muted);text-align:center;}

/* Merge section */
#merge-section{background:white;border:2px solid var(--amber);border-radius:12px;margin-bottom:1.5rem;overflow:hidden;}
#merge-section .section-header{background:var(--amber-bg);border-bottom-color:rgba(156,107,30,0.2);}
.merge-toolbar{padding:0.75rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.6rem;flex-wrap:wrap;background:var(--surface);}
.merge-toolbar-info{font-size:0.63rem;color:var(--ink-muted);flex:1;}
.merge-pair-row{display:flex;align-items:flex-start;gap:0.75rem;padding:0.75rem 1.1rem;border-bottom:1px solid var(--surface2);}
.merge-pair-row:last-child{border-bottom:none;}
.merge-pair-check{flex-shrink:0;margin-top:0.2rem;accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
.merge-pair-body{flex:1;min-width:0;}
.merge-pair-header{font-size:0.65rem;font-weight:600;color:var(--accent);margin-bottom:0.35rem;}
.merge-pair-cards{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.35rem;}
.merge-record-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.5rem 0.65rem;font-size:0.6rem;color:var(--ink-dim);line-height:1.55;}
.merge-record-card strong{color:var(--ink);font-size:0.62rem;display:block;margin-bottom:0.15rem;}
.merge-result-card{background:var(--green-bg);border:1px solid rgba(74,124,89,0.25);border-radius:6px;padding:0.5rem 0.65rem;font-size:0.6rem;color:var(--ink-dim);line-height:1.55;margin-top:0.35rem;}
.merge-result-card strong{color:var(--green);font-size:0.62rem;display:block;margin-bottom:0.15rem;}
.merge-status{font-size:0.6rem;color:var(--ink-muted);font-style:italic;margin-top:0.25rem;}
.merge-status.merging{color:var(--amber);}
.merge-status.done{color:var(--green);font-style:normal;}
.merge-status.error{color:var(--red);font-style:normal;}
.merge-commit-bar{padding:0.85rem 1.1rem;border-top:2px solid var(--green);background:var(--green-bg);display:none;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.merge-commit-info{font-size:0.65rem;color:var(--ink-dim);flex:1;}

/* Confirm modal */
#confirm-overlay{display:none;position:fixed;inset:0;background:rgba(42,37,32,0.55);z-index:999;align-items:center;justify-content:center;padding:2rem;}
#confirm-overlay.open{display:flex;}
.confirm-box{background:white;border-radius:13px;width:100%;max-width:460px;box-shadow:0 10px 48px rgba(42,37,32,0.2);overflow:hidden;}
.confirm-header{padding:0.85rem 1.25rem;border-bottom:1px solid var(--border);font-family:'Instrument Serif',serif;font-size:1rem;color:var(--ink);}
.confirm-body{padding:1.1rem 1.25rem;font-size:0.72rem;color:var(--ink-dim);line-height:1.75;}
.confirm-footer{padding:0.75rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.5rem;}
</style>
</head>
<body>

<div id="signin-section">
  <h1>🐾 Paw Records</h1>
  <div class="subtitle">Data Audit &amp; Merge Tool</div>
  <button class="btn-google" id="signin-btn">
    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </button>
  <div id="signin-error" style="margin-top:1rem;font-size:0.65rem;color:var(--red);display:none;"></div>
</div>

<div id="audit-section">
  <div class="header-row">
    <div>
      <h1>🐾 Data Audit &amp; Merge</h1>
      <div class="subtitle" id="user-label">loading…</div>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
      <button class="btn" id="run-btn">Run Audit</button>
      <button class="btn secondary" id="find-empty-btn">Find Empty Files</button>
      <button class="btn secondary" id="signout-btn">Sign out</button>
    </div>
  </div>

  <div id="progress-section" style="display:none;" class="progress-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">Loading…</div>
  </div>

  <div id="summary-grid" class="summary-grid" style="display:none;"></div>

  <!-- Merge section lives here, built dynamically -->
  <div id="merge-section" style="display:none;">
    <div class="section-header" id="merge-header">
      <span class="section-title">⚡ Merge Duplicate Pairs</span>
      <span class="section-meta">
        <span class="section-count" id="merge-count" style="color:var(--amber);"></span>
        <span class="section-arrow">▶</span>
      </span>
    </div>
    <div class="section-body" id="merge-body">
      <div class="merge-toolbar">
        <span class="merge-toolbar-info" id="merge-toolbar-info"></span>
        <button class="btn secondary" id="check-all-btn" style="font-size:0.65rem;padding:0.35rem 0.7rem;">Check all</button>
        <button class="btn secondary" id="uncheck-all-btn" style="font-size:0.65rem;padding:0.35rem 0.7rem;">Uncheck all</button>
        <button class="btn" id="generate-previews-btn">Generate merge previews →</button>
      </div>
      <div id="merge-pairs-list"></div>
      <div class="merge-commit-bar" id="merge-commit-bar">
        <span class="merge-commit-info" id="merge-commit-info"></span>
        <div style="display:flex;gap:0.5rem;flex-shrink:0;">
          <button class="btn secondary" id="regenerate-btn">↻ Regenerate</button>
          <button class="btn green" id="commit-btn">✓ Commit merges to Firestore</button>
        </div>
      </div>
    </div>
  </div>

  <div id="results"></div>
</div>

<div id="confirm-overlay">
  <div class="confirm-box">
    <div class="confirm-header" id="confirm-title">Confirm</div>
    <div class="confirm-body" id="confirm-body"></div>
    <div class="confirm-footer">
      <button class="btn secondary" id="confirm-cancel">Cancel</button>
      <button class="btn green" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, query, orderBy, where, writeBatch }
  from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBECkOIkB_rbreDsTo44Kvwq0jL6f29cv0",
  authDomain: "pawrecords-1a8e6.firebaseapp.com",
  projectId: "pawrecords-1a8e6",
  storageBucket: "pawrecords-1a8e6.firebasestorage.app",
  messagingSenderId: "434841981751",
  appId: "1:434841981751:web:eb27c2ebb38920e9b040b2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
const $ = id => document.getElementById(id);

let currentUser = null;
let apiKey = '';
let mergeResults = []; // { idx, merged, primaryId, secondaryId }

// ── AUTH ──
onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    $('signin-section').style.display = 'none';
    $('audit-section').style.display = 'block';
    $('user-label').textContent = `${user.email} · loading API key…`;
    try {
      const snap = await getDoc(doc(db, 'settings', user.uid));
      if (snap.exists() && snap.data().anthropicKey) {
        apiKey = snap.data().anthropicKey;
        $('user-label').textContent = `${user.email} · API key loaded ✓`;
      } else {
        $('user-label').textContent = `${user.email} · ⚠ no API key found — merge previews will not work`;
      }
    } catch(e) {
      $('user-label').textContent = `${user.email} · could not load API key: ${e.message}`;
    }
  } else {
    $('signin-section').style.display = 'block';
    $('audit-section').style.display = 'none';
  }
});

$('signin-btn').addEventListener('click', async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { $('signin-error').textContent = e.message; $('signin-error').style.display = 'block'; }
});
$('signout-btn').addEventListener('click', () => signOut(auth));

// ── HELPERS ──
function normClinic(s) {
  if (!s) return '';
  return s.toLowerCase()
    .replace(/\b(animal|veterinary|vet|hospital|clinic|center|care|pet|the|of|&|and)\b/g,'')
    .replace(/[^a-z0-9]/g,'').trim();
}
function dateDiff(a, b) {
  if (!a || !b) return 9999;
  return Math.abs((new Date(a+'T12:00:00') - new Date(b+'T12:00:00')) / 86400000);
}
function hasClinicValue(meds, procs) {
  const NOISE = /syringe|disposal|fee|tax|bandage|glove|admin|nail trim|exam fee|office visit/i;
  return (meds||[]).some(m => m.name && !NOISE.test(m.name)) ||
         (procs||[]).some(p => p.name && !NOISE.test(p.name));
}
function fmtDate(d) {
  if (!d || d==='unknown') return '—';
  try { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  catch { return d; }
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function setProgress(pct, label) {
  $('progress-fill').style.width = pct+'%';
  $('progress-label').textContent = label;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── CONFIRM DIALOG ──
function showConfirm(title, bodyHtml) {
  return new Promise(resolve => {
    $('confirm-title').textContent = title;
    $('confirm-body').innerHTML = bodyHtml;
    $('confirm-overlay').classList.add('open');
    $('confirm-ok').onclick = () => { $('confirm-overlay').classList.remove('open'); resolve(true); };
    $('confirm-cancel').onclick = () => { $('confirm-overlay').classList.remove('open'); resolve(false); };
    $('confirm-overlay').onclick = e => { if(e.target===$('confirm-overlay')){ $('confirm-overlay').classList.remove('open'); resolve(false); } };
  });
}

// ── CLAUDE MERGE ──
const MERGE_STRIP_FIELDS = new Set(['createdAt','updatedAt','mergedFrom','mergedAt','visitCluster','sourceFileId','driveFileIds','sourceFiles','confidence','flags','_id']);
function stripForMerge(record) {
  return Object.fromEntries(Object.entries(record).filter(([k]) => !MERGE_STRIP_FIELDS.has(k)));
}

async function callClaudeMerge(a, b) {
  const prompt = `You are merging two veterinary visit records for the same cat on the same day at the same clinic. They came from two different source documents.

Record A:
${JSON.stringify(stripForMerge(a), null, 2)}

Record B:
${JSON.stringify(stripForMerge(b), null, 2)}

Merge rules:
- chiefComplaint: prefer the more specific/detailed value
- synopsis: combine into one coherent 2-4 sentence summary preserving all unique clinical facts; do not repeat information
- narrative: merge section by section (HISTORY/EXAM/ASSESSMENT/PLAN); preserve all unique details from both; do not duplicate sentences; prefer longer/more detailed content
- medications: union both lists; deduplicate by drug name (treat "pred", "prednisolone", "Prednisolone 5mg" as the same — keep the most detailed entry)
- procedures: union both lists; deduplicate by procedure name
- vitals: merge objects; prefer non-null values; if both have the same field prefer the more specific one
- visitClass: prefer "problem" over "well" if either says problem
- clinic, doctor, cat, date: prefer non-null; Record A wins on conflict
- sourceFiles: union both arrays (deduplicated)
- driveFileIds: union both arrays (deduplicated)
- confidence: take the higher value
- flags: union both arrays

Return ONLY valid JSON — the merged visit record with all fields. No markdown, no commentary.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 3000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) {
    if (res.status === 429 || res.status === 529) throw new Error('rate_limit');
    const err = await res.json().catch(()=>({}));
    throw new Error(err?.error?.message || `API ${res.status}`);
  }
  const data = await res.json();
  const raw = data.content.map(b=>b.text||'').join('').trim();
  return JSON.parse(raw.replace(/```json|```/g,'').trim());
}

// ── FIND EMPTY FILES ──
$('find-empty-btn').addEventListener('click', findEmptyFiles);

async function findEmptyFiles() {
  const btn = $('find-empty-btn');
  btn.disabled = true;
  btn.textContent = 'Scanning…';

  // Remove any previous results panel
  document.getElementById('empty-files-panel')?.remove();

  try {
    // Load ALL files regardless of status
    const filesSnap = await getDocs(collection(db, 'files'));
    if (filesSnap.empty) { alert('No files found in Firestore.'); return; }

    const [visitsSnap, labsSnap] = await Promise.all([
      getDocs(collection(db, 'visits')),
      getDocs(collection(db, 'labs'))
    ]);

    const fileHasVisit = new Set(visitsSnap.docs.flatMap(d => {
      const data = d.data();
      return [...(data.driveFileIds || []), data.sourceFileId].filter(Boolean);
    }));
    const fileHasLab = new Set(labsSnap.docs.map(d => d.data().driveFileId).filter(Boolean));

    // All files with no associated records, grouped by status
    const emptyByStatus = {};
    filesSnap.docs.forEach(d => {
      const data = d.data();
      const id = data.driveFileId || d.id;
      const status = data.status || 'unprocessed';
      if (!fileHasVisit.has(id) && !fileHasLab.has(id)) {
        if (!emptyByStatus[status]) emptyByStatus[status] = [];
        emptyByStatus[status].push({ docId: d.id, fileId: id, filename: data.filename || id, status });
      }
    });

    const allEmpty = Object.values(emptyByStatus).flat();

    // Build results panel
    const panel = document.createElement('div');
    panel.id = 'empty-files-panel';
    panel.style.cssText = 'background:white;border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin:1rem 0;';

    if (!allEmpty.length) {
      panel.innerHTML = '<p style="font-family:JetBrains Mono,monospace;font-size:0.72rem;color:var(--green);">✓ All files have associated records — nothing empty.</p>';
    } else {
      const statusOrder = ['complete', 'flagged', 'failed', 'processing', 'unprocessed', 'empty'];
      let html = `<div style="font-family:JetBrains Mono,monospace;font-size:0.75rem;font-weight:700;margin-bottom:0.75rem;">Found ${allEmpty.length} file(s) with no records:</div>`;

      for (const status of statusOrder) {
        const group = emptyByStatus[status];
        if (!group?.length) continue;
        html += `<div style="margin-bottom:0.75rem;">
          <div style="font-family:JetBrains Mono,monospace;font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-muted);margin-bottom:0.3rem;">${status} (${group.length})</div>
          ${group.map(f => `<div style="font-family:JetBrains Mono,monospace;font-size:0.65rem;padding:0.15rem 0;color:var(--ink-dim);">• ${escapeHtml(f.filename)} <span style="color:var(--ink-muted);font-size:0.58rem;">[${escapeHtml(f.fileId)}]</span></div>`).join('')}
        </div>`;
      }

      // Only offer to reset non-unprocessed ones
      const resettable = allEmpty.filter(f => f.status !== 'unprocessed');
      if (resettable.length) {
        html += `<button id="do-reset-btn" style="margin-top:0.5rem;padding:0.4rem 0.8rem;font-family:JetBrains Mono,monospace;font-size:0.65rem;background:var(--accent);color:white;border:none;border-radius:6px;cursor:pointer;">Reset ${resettable.length} to unprocessed</button>`;
      }
      panel.innerHTML = html;

      if (resettable.length) {
        panel.querySelector('#do-reset-btn').onclick = async () => {
          panel.querySelector('#do-reset-btn').disabled = true;
          panel.querySelector('#do-reset-btn').textContent = 'Resetting…';
          for (const f of resettable) {
            await setDoc(doc(db, 'files', f.docId), { status: 'unprocessed', updatedAt: new Date().toISOString() }, { merge: true });
          }
          panel.querySelector('#do-reset-btn').textContent = `✓ ${resettable.length} file(s) reset`;
        };
      }
    }

    // Insert after the button row
    document.querySelector('.header-row').after(panel);

  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Find Empty Files';
  }
}

function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── MAIN AUDIT ──
$('run-btn').addEventListener('click', runAudit);

async function runAudit() {
  $('run-btn').disabled = true;
  $('progress-section').style.display = 'block';
  $('summary-grid').style.display = 'none';
  $('summary-grid').innerHTML = '';
  $('merge-section').style.display = 'none';
  $('results').innerHTML = '';
  mergeResults = [];

  try {
    setProgress(5, 'Loading visits…');
    const snap = await getDocs(query(collection(db, 'visits'), orderBy('date','desc')));
    const visits = snap.docs.map(d => ({ _id: d.id, ...d.data() }));
    setProgress(40, `Loaded ${visits.length} records. Analysing…`);

    const invoices = visits.filter(v => v.docType === 'Invoice');
    const clinical = visits.filter(v => v.docType !== 'Invoice');

    const emptyInvoices = invoices.filter(v => !hasClinicValue(v.medications, v.procedures));

    const matchedInvoices = [], orphanInvoices = [];
    for (const inv of invoices) {
      if (!hasClinicValue(inv.medications, inv.procedures)) continue;
      const ic = normClinic(inv.clinic);
      const match = clinical.find(v =>
        v.cat === inv.cat && dateDiff(v.date, inv.date) <= 3 &&
        (ic==='' || normClinic(v.clinic)==='' || normClinic(v.clinic)===ic)
      );
      if (match) matchedInvoices.push({invoice:inv, match});
      else orphanInvoices.push(inv);
    }

    setProgress(60, 'Finding duplicate clusters…');

    // Group by cat + date + normalized clinic → clusters of 2+ records
    const clusterMap = new Map();
    const sameDateDiffClinic = [];
    for (const v of clinical) {
      const nc = normClinic(v.clinic);
      const key = `${v.cat}||${v.date}||${nc}`;
      if (!clusterMap.has(key)) clusterMap.set(key, []);
      clusterMap.get(key).push(v);
    }

    const mergeClusters = []; // arrays of 2+ records with same cat+date+clinic
    for (const [, records] of clusterMap) {
      if (records.length < 2) continue;
      mergeClusters.push(records);
    }

    // Same date, different clinics — legitimate separate visits
    const dateMap = new Map();
    for (const v of clinical) {
      const key = `${v.cat}||${v.date}`;
      if (!dateMap.has(key)) dateMap.set(key, []);
      dateMap.get(key).push(v);
    }
    for (const [, records] of dateMap) {
      if (records.length < 2) continue;
      const clinics = [...new Set(records.map(r => normClinic(r.clinic)).filter(Boolean))];
      if (clinics.length > 1) {
        // Multiple clinics on same day — flag each unique pair across different clinics
        for (let i = 0; i < records.length; i++) {
          for (let j = i+1; j < records.length; j++) {
            const ca = normClinic(records[i].clinic), cb = normClinic(records[j].clinic);
            if (ca !== cb) sameDateDiffClinic.push({a: records[i], b: records[j]});
          }
        }
      }
    }

    setProgress(75, 'Finding lab-rollover clusters…');

    // Rollover: same cat + same normalized clinic + dates within 3 days
    // Group into clusters using union-find so a 3-day chain becomes one cluster
    const rolloverClusters = [];
    const assignedR = new Set();
    const sortedClinical = [...clinical].sort((a,b) => (a.date||'').localeCompare(b.date||''));
    for (let i = 0; i < sortedClinical.length; i++) {
      const v = sortedClinical[i];
      if (assignedR.has(v._id)) continue;
      const cluster = [v];
      assignedR.add(v._id);
      for (let j = i+1; j < sortedClinical.length; j++) {
        const w = sortedClinical[j];
        if (assignedR.has(w._id)) continue;
        if (w.cat !== v.cat) continue;
        const diff = dateDiff(cluster[cluster.length-1].date, w.date);
        if (diff === 0) continue; // same date handled by merge clusters
        if (diff > 3) break; // sorted by date so no point continuing
        const ca = normClinic(cluster[0].clinic), cb = normClinic(w.clinic);
        if (ca === '' || cb === '' || ca !== cb) continue;
        cluster.push(w);
        assignedR.add(w._id);
      }
      if (cluster.length > 1) rolloverClusters.push(cluster);
    }

    setProgress(90, 'Building report…');

    // Summary cards
    const mergeRecordCount = mergeClusters.reduce((sum, c) => sum + c.length, 0);
    const rolloverRecordCount = rolloverClusters.reduce((sum, c) => sum + c.length, 0);
    const cards = [
      {label:'Total visits', value:clinical.length, sub:'clinical records', cls:''},
      {label:'Total invoices', value:invoices.length, sub:`${emptyInvoices.length} empty`, cls:invoices.length>0?'warn':''},
      {label:'Merge clusters', value:mergeClusters.length, sub:`${mergeRecordCount} records affected`, cls:mergeClusters.length>0?'alert':'good'},
      {label:'Legit same-day', value:sameDateDiffClinic.length, sub:'diff clinics ✓', cls:''},
      {label:'Orphan invoices', value:orphanInvoices.length, sub:'no clinical match', cls:orphanInvoices.length>0?'warn':'good'},
      {label:'Empty invoices', value:emptyInvoices.length, sub:'safe to delete', cls:emptyInvoices.length>0?'alert':'good'},
      {label:'Rollover clusters', value:rolloverClusters.length, sub:`${rolloverRecordCount} records`, cls:rolloverClusters.length>0?'warn':'good'},
    ];
    $('summary-grid').innerHTML = cards.map(c=>`
      <div class="card ${c.cls}">
        <div class="card-label">${c.label}</div>
        <div class="card-value">${c.value}</div>
        <div class="card-sub">${c.sub}</div>
      </div>`).join('');
    $('summary-grid').style.display = 'grid';

    // Merge section
    if (mergeClusters.length) {
      buildMergeSection(mergeClusters);
      $('merge-section').style.display = 'block';
      $('merge-header').classList.add('open');
      $('merge-body').classList.add('open');
    }

    // Audit sections
    const results = $('results');

    results.appendChild(buildSection(
      '✓ Same-day visits — different clinics (legitimate)',
      sameDateDiffClinic.length, 'var(--green)',
      sameDateDiffClinic.length === 0
        ? '<div class="empty-note">None found.</div>'
        : `<table><tr><th>Cat</th><th>Date</th><th>Clinic A</th><th>Clinic B</th></tr>
          ${sameDateDiffClinic.map(({a,b})=>`<tr>
            <td>${esc(a.cat||'—')}</td><td>${fmtDate(a.date)}</td>
            <td style="font-size:0.6rem;">${esc(a.clinic||'—')}</td>
            <td style="font-size:0.6rem;">${esc(b.clinic||'—')}</td>
          </tr>`).join('')}</table>`
    ));

    results.appendChild(buildSection(
      '🗑 Empty invoices — safe to delete',
      emptyInvoices.length, 'var(--red)',
      emptyInvoices.length === 0
        ? '<div class="empty-note">✓ None found.</div>'
        : `<table><tr><th>Cat</th><th>Date</th><th>Clinic</th><th>Source file</th></tr>
          ${emptyInvoices.map(v=>`<tr>
            <td>${esc(v.cat||'—')}</td><td>${fmtDate(v.date)}</td><td>${esc(v.clinic||'—')}</td>
            <td style="font-size:0.58rem;color:var(--ink-muted);">${esc((v.sourceFiles||[v.sourceFile||''])[0]||'—')}</td>
          </tr>`).join('')}</table>`
    ));

    results.appendChild(buildSection(
      '📋 Orphan invoices — no matching clinical note (keep these)',
      orphanInvoices.length, 'var(--blue)',
      orphanInvoices.length === 0
        ? '<div class="empty-note">✓ All invoices have matching clinical notes.</div>'
        : `<table><tr><th>Cat</th><th>Date</th><th>Clinic</th><th>Meds / procedures</th></tr>
          ${orphanInvoices.map(v=>{
            const items=[...(v.medications||[]).map(m=>m.name),...(v.procedures||[]).map(p=>p.name)].filter(Boolean).join(', ');
            return `<tr>
              <td>${esc(v.cat||'—')}</td><td>${fmtDate(v.date)}</td><td>${esc(v.clinic||'—')}</td>
              <td style="font-size:0.6rem;">${esc(items||'—')}</td>
            </tr>`;
          }).join('')}</table>`
    ));

    results.appendChild(buildSection(
      '🔗 Matched invoices — have a clinical note',
      matchedInvoices.length, 'var(--amber)',
      matchedInvoices.length === 0
        ? '<div class="empty-note">None found.</div>'
        : `<table><tr><th>Cat</th><th>Invoice date</th><th>Visit date</th><th>Clinic</th><th>Invoice meds</th></tr>
          ${matchedInvoices.map(({invoice:inv,match})=>{
            const meds=(inv.medications||[]).map(m=>m.name).filter(Boolean).slice(0,3).join(', ');
            return `<tr>
              <td>${esc(inv.cat||'—')}</td><td>${fmtDate(inv.date)}</td>
              <td>${fmtDate(match.date)} <span style="font-size:0.56rem;color:var(--ink-muted);">(${dateDiff(inv.date,match.date)}d)</span></td>
              <td style="font-size:0.6rem;">${esc(inv.clinic||'—')}</td>
              <td style="font-size:0.6rem;">${esc(meds||'—')}</td>
            </tr>`;
          }).join('')}</table>`
    ));

    // Store clusters globally so the reviewer can access them
    window._rolloverClusters = rolloverClusters;
    window._allVisits = visits;

    results.appendChild(buildSection(
      '🔬 Lab-rollover clusters — same clinic, adjacent dates',
      rolloverClusters.length, 'var(--amber)',
      rolloverClusters.length === 0
        ? '<div class="empty-note">✓ None found.</div>'
        : `<table><tr><th>Cat</th><th>Clinic</th><th>Records</th><th>Date range</th><th></th></tr>
          ${rolloverClusters.map((cluster, idx) => {
            const dates = [...new Set(cluster.map(r=>r.date))].sort();
            const dateRange = dates.length === 1 ? fmtDate(dates[0]) : `${fmtDate(dates[0])} – ${fmtDate(dates[dates.length-1])}`;
            const complaints = cluster.map(r=>(r.chiefComplaint||'').slice(0,25)||'—').join(' · ');
            return `<tr>
              <td>${esc(cluster[0].cat||'—')}</td>
              <td style="font-size:0.6rem;">${esc(cluster[0].clinic||'—')}</td>
              <td style="font-size:0.6rem;">${cluster.length} records<br><span style="color:var(--ink-muted);">${esc(complaints)}</span></td>
              <td style="font-size:0.6rem;">${dateRange}</td>
              <td><button class="btn" style="font-size:0.6rem;padding:0.25rem 0.6rem;" onclick="openRolloverReviewer(${idx})">Review →</button></td>
            </tr>`;
          }).join('')}</table>`
    ));

    const noDates = clinical.filter(v => !v.date || v.date==='unknown');
    results.appendChild(buildSection('📅 Missing dates', noDates.length, 'var(--red)',
      noDates.length === 0 ? '<div class="empty-note">✓ All records have dates.</div>'
        : `<table><tr><th>Cat</th><th>Clinic</th><th>Chief complaint</th><th>Source file</th></tr>
          ${noDates.map(v=>`<tr>
            <td>${esc(v.cat||'—')}</td><td>${esc(v.clinic||'—')}</td>
            <td style="font-size:0.6rem;">${esc((v.chiefComplaint||'').slice(0,50)||'—')}</td>
            <td style="font-size:0.58rem;color:var(--ink-muted);">${esc((v.sourceFiles||[v.sourceFile||''])[0]||'—')}</td>
          </tr>`).join('')}</table>`
    ));

    const noCat = visits.filter(v => !v.cat || v.cat==='Unknown');
    results.appendChild(buildSection('🐱 Records without a cat', noCat.length, 'var(--red)',
      noCat.length === 0 ? '<div class="empty-note">✓ All records have a cat assigned.</div>'
        : `<table><tr><th>Date</th><th>Clinic</th><th>Chief complaint</th><th>Source file</th></tr>
          ${noCat.map(v=>`<tr>
            <td>${fmtDate(v.date)}</td><td>${esc(v.clinic||'—')}</td>
            <td style="font-size:0.6rem;">${esc((v.chiefComplaint||'').slice(0,50)||'—')}</td>
            <td style="font-size:0.58rem;color:var(--ink-muted);">${esc((v.sourceFiles||[v.sourceFile||''])[0]||'—')}</td>
          </tr>`).join('')}</table>`
    ));

    // Auto-open non-empty sections
    setTimeout(()=>{
      results.querySelectorAll('.section-header').forEach(hdr=>{
        const n = parseInt(hdr.querySelector('.section-count')?.textContent||'0');
        if (n>0){ hdr.classList.add('open'); hdr.nextElementSibling.classList.add('open'); }
      });
    }, 100);

    setProgress(100, `Done — ${visits.length} records analysed.`);
    setTimeout(()=>{ $('progress-section').style.display='none'; }, 1500);

  } catch(err) {
    $('progress-label').textContent = 'Error: ' + err.message;
    console.error(err);
  }
  $('run-btn').disabled = false;
}

// ── MERGE SECTION ──
function buildMergeSection(clusters) {
  const totalRecords = clusters.reduce((s,c)=>s+c.length,0);
  $('merge-count').textContent = `${clusters.length} cluster${clusters.length!==1?'s':''}`;
  $('merge-toolbar-info').textContent =
    `${clusters.length} cluster${clusters.length!==1?'s':''} (${totalRecords} records) · same cat + date + clinic. Uncheck any to skip.`;

  const list = $('merge-pairs-list');
  list.innerHTML = '';

  clusters.forEach((cluster, idx) => {
    const row = document.createElement('div');
    row.className = 'merge-pair-row';
    const cardHtml = cluster.map((r, ri) => {
      const files = (r.sourceFiles||[r.sourceFile||'']).filter(Boolean).join(', ');
      const meds = (r.medications||[]).map(m=>m.name).filter(Boolean).slice(0,3).join(', ');
      return `<div class="merge-record-card">
        <strong>Record ${String.fromCharCode(65+ri)} · ${fmtDate(r.date)}</strong>
        ${esc(r.chiefComplaint||'no complaint')}<br>
        <span style="color:var(--ink-muted);">meds: ${esc(meds||'none')}</span><br>
        <span style="color:var(--ink-muted);font-size:0.56rem;">${esc(files||'—')}</span>
      </div>`;
    }).join('');
    row.innerHTML = `
      <input type="checkbox" class="merge-pair-check" data-idx="${idx}" checked>
      <div class="merge-pair-body">
        <div class="merge-pair-header">${esc(cluster[0].cat)} · ${fmtDate(cluster[0].date)} · ${esc(cluster[0].clinic||'unknown clinic')} · ${cluster.length} records</div>
        <div class="merge-pair-cards" style="grid-template-columns:repeat(${Math.min(cluster.length,3)},1fr);">${cardHtml}</div>
        <div class="merge-status" id="merge-status-${idx}">awaiting preview generation</div>
        <div id="merge-preview-${idx}"></div>
      </div>`;
    list.appendChild(row);
  });

  $('check-all-btn').onclick = () => list.querySelectorAll('.merge-pair-check').forEach(c=>c.checked=true);
  $('uncheck-all-btn').onclick = () => list.querySelectorAll('.merge-pair-check').forEach(c=>c.checked=false);
  $('generate-previews-btn').onclick = () => generatePreviews(clusters);
  $('regenerate-btn').onclick = () => generatePreviews(clusters);
  $('commit-btn').onclick = () => commitMerges();
}

async function generatePreviews(clusters) {
  if (!apiKey) {
    alert('No API key loaded. Make sure it is set in the main Paw Records app and try signing in again.');
    return;
  }
  const checkedIdxs = [...document.querySelectorAll('.merge-pair-check:checked')].map(c=>parseInt(c.dataset.idx));
  if (!checkedIdxs.length) { alert('No clusters checked.'); return; }

  $('generate-previews-btn').disabled = true;
  $('generate-previews-btn').textContent = `Generating ${checkedIdxs.length} previews…`;
  $('merge-commit-bar').style.display = 'none';
  mergeResults = [];

  checkedIdxs.forEach(idx => {
    $(`merge-status-${idx}`).className = 'merge-status';
    $(`merge-status-${idx}`).textContent = 'queued…';
    $(`merge-preview-${idx}`).innerHTML = '';
  });

  for (let i = 0; i < checkedIdxs.length; i += 3) {
    const batch = checkedIdxs.slice(i, i+3);
    await Promise.all(batch.map(async idx => {
      const cluster = clusters[idx];
      const statusEl = $(`merge-status-${idx}`);
      const previewEl = $(`merge-preview-${idx}`);
      statusEl.className = 'merge-status merging';
      statusEl.textContent = `merging ${cluster.length} records…`;
      let attempts = 0;
      while (attempts < 3) {
        try {
          let merged = Object.fromEntries(Object.entries(cluster[0]).filter(([k])=>k!=='_id'));
          for (let r = 1; r < cluster.length; r++) {
            const next = Object.fromEntries(Object.entries(cluster[r]).filter(([k])=>k!=='_id'));
            merged = await callClaudeMerge(stripForMerge(merged), stripForMerge(next));
            if (r < cluster.length - 1) statusEl.textContent = `merged ${r+1}/${cluster.length}…`;
          }
          const secondaryIds = cluster.slice(1).map(r=>r._id);
          mergeResults.push({ idx, merged, primaryId: cluster[0]._id, secondaryIds });
          const mMeds = (merged.medications||[]).map(m=>m.name).filter(Boolean).slice(0,4).join(', ');
          previewEl.innerHTML = `
            <div class="merge-result-card">
              <strong>Merged result (${cluster.length} → 1)</strong>
              ${esc(merged.chiefComplaint||'—')}<br>
              <span style="color:var(--ink-dim);">${esc((merged.synopsis||'').slice(0,140))}${(merged.synopsis||'').length>140?'…':''}</span><br>
              <span style="color:var(--ink-muted);">meds: ${esc(mMeds||'none')} · ${(merged.medications||[]).length} total</span>
            </div>`;
          statusEl.className = 'merge-status done';
          statusEl.textContent = `✓ preview ready — ${cluster.length} records → 1`;
          break;
        } catch(err) {
          if (err.message === 'rate_limit' && attempts < 2) {
            attempts++;
            statusEl.textContent = `rate limited — retrying in ${15*attempts}s…`;
            await sleep(15000 * attempts);
          } else {
            statusEl.className = 'merge-status error';
            statusEl.textContent = `✗ ${err.message}`;
            break;
          }
        }
      }
    }));
    if (i + 3 < checkedIdxs.length) await sleep(800);
  }

  $('generate-previews-btn').disabled = false;
  $('generate-previews-btn').textContent = 'Generate merge previews →';

  if (mergeResults.length) {
    $('merge-commit-bar').style.display = 'flex';
    const totalDeleted = mergeResults.reduce((s,r)=>s+r.secondaryIds.length, 0);
    $('merge-commit-info').textContent =
      `${mergeResults.length} clusters ready. Will write ${mergeResults.length} merged records and delete ${totalDeleted} secondaries.`;
  }
}

async function commitMerges() {
  if (!mergeResults.length) return;
  const totalDeleted = mergeResults.reduce((s,r)=>s+r.secondaryIds.length, 0);
  const ok = await showConfirm(
    'Commit all merges?',
    `This will write <strong>${mergeResults.length} merged records</strong> to Firestore and permanently delete <strong>${totalDeleted} secondary records</strong>.<br><br>
    Make sure the previews above look correct. <strong>This cannot be undone.</strong>`
  );
  if (!ok) return;

  $('commit-btn').disabled = true;
  $('commit-btn').textContent = 'Committing…';

  let succeeded = 0, failed = 0;
  for (const { idx, merged, primaryId, secondaryIds } of mergeResults) {
    const statusEl = $(`merge-status-${idx}`);
    statusEl.className = 'merge-status merging';
    statusEl.textContent = 'writing to Firestore…';
    try {
      const { _id, ...clean } = merged;
      clean.mergedFrom = [primaryId, ...secondaryIds];
      clean.mergedAt = new Date().toISOString();
      clean.sourceFiles = [...new Set([...(clean.sourceFiles||[])])];
      await setDoc(doc(db, 'visits', primaryId), clean);
      for (const sid of secondaryIds) await deleteDoc(doc(db, 'visits', sid));
      statusEl.className = 'merge-status done';
      statusEl.textContent = `✓ committed — ${secondaryIds.length} record${secondaryIds.length!==1?'s':''} deleted`;
      succeeded++;
    } catch(err) {
      statusEl.className = 'merge-status error';
      statusEl.textContent = `✗ write failed: ${err.message}`;
      console.error('Commit error:', err);
      failed++;
    }
  }

  $('commit-btn').disabled = false;
  $('commit-btn').textContent = '✓ Commit merges to Firestore';
  $('merge-commit-info').textContent = failed === 0
    ? `✓ All ${succeeded} clusters merged. Reload the main app to see changes.`
    : `${succeeded} succeeded, ${failed} failed — check console for details.`;
  $('merge-count').textContent = `${succeeded} merged ✓`;
}

// ── SECTION BUILDER ──
function buildSection(title, count, color, rows) {
  const sec = document.createElement('div');
  sec.className = 'section';
  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.innerHTML = `
    <span class="section-title">${title}</span>
    <span class="section-meta">
      <span class="section-count" style="color:${color}">${count} item${count!==1?'s':''}</span>
      <span class="section-arrow">▶</span>
    </span>`;
  hdr.addEventListener('click',()=>{
    hdr.classList.toggle('open');
    body.classList.toggle('open');
  });
  const body = document.createElement('div');
  body.className = 'section-body';
  body.innerHTML = rows;
  sec.appendChild(hdr);
  sec.appendChild(body);
  return sec;
}

// ── ROLLOVER REVIEWER ──
let _reviewerIdx = 0;
let _ignoredSources = []; // { fileId, filename, reason }

function openRolloverReviewer(idx) {
  _reviewerIdx = idx;
  renderReviewer();
  $('reviewer-overlay').style.display = 'block';
}

$('reviewer-close').onclick = () => { $('reviewer-overlay').style.display = 'none'; };
$('reviewer-overlay').onclick = e => { if (e.target === $('reviewer-overlay')) $('reviewer-overlay').style.display = 'none'; };
$('reviewer-prev').onclick = () => { if (_reviewerIdx > 0) { _reviewerIdx--; renderReviewer(); } };
$('reviewer-next').onclick = () => { const pairs = window._rolloverClusters||[]; if (_reviewerIdx < pairs.length-1) { _reviewerIdx++; renderReviewer(); } };

$('reviewer-skip').onclick = async () => {
  const clusters = window._rolloverClusters||[];
  const cluster = clusters[_reviewerIdx];
  // Silently deduplicate labs across the cluster — same cat+test+value+date → keep one
  try { await deduplicateClusterLabs(cluster); } catch(e) { console.warn('Lab dedup failed:', e.message); }
  if (_reviewerIdx < clusters.length-1) { _reviewerIdx++; renderReviewer(); }
  else $('reviewer-overlay').style.display = 'none';
};

// Deduplicate labs for a cluster: for each exact duplicate (cat+test+value+date), keep one and delete the rest
async function deduplicateClusterLabs(cluster) {
  const allFileIds = [...new Set(cluster.flatMap(r => [...(r.driveFileIds||[]), r.sourceFileId].filter(Boolean)))];
  if (!allFileIds.length) return;

  // Load all labs referenced by any record in this cluster
  const snaps = await Promise.all(
    // Firestore 'in' queries max 30 items — chunk if needed
    chunkArray(allFileIds, 10).map(ids =>
      getDocs(query(collection(db, 'labs'), where('driveFileId', 'in', ids)))
    )
  );
  const labs = snaps.flatMap(s => s.docs.map(d => ({ _docId: d.id, ...d.data() })));
  if (!labs.length) return;

  // Group by dedup key: cat + test + value + resultDate
  const seen = new Map();
  const toDelete = [];
  for (const lab of labs) {
    const key = `${lab.cat}||${lab.test}||${lab.value}||${lab.resultDate||lab.visitDate||''}`;
    if (seen.has(key)) {
      toDelete.push(lab._docId);
    } else {
      seen.set(key, lab._docId);
    }
  }
  if (!toDelete.length) return;

  // Delete in batches
  for (const chunk of chunkArray(toDelete, 400)) {
    const b = writeBatch(db);
    chunk.forEach(id => b.delete(doc(db, 'labs', id)));
    await b.commit();
  }
  console.log(`Deduped ${toDelete.length} lab records for cluster`);
}

function chunkArray(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

$('reviewer-delete-b').onclick = async () => {
  const clusters = window._rolloverClusters||[];
  const cluster = clusters[_reviewerIdx];
  // "Delete B" now means delete all records except the first (primary)
  const toDelete = cluster.slice(1);
  const desc = toDelete.map(r=>`${fmtDate(r.date)} · ${r.chiefComplaint||'no complaint'}`).join('\n');
  if (!confirm(`Delete ${toDelete.length} secondary record${toDelete.length!==1?'s':''}:\n${desc}\n\nRecord A will be kept unchanged. This cannot be undone.`)) return;
  try {
    for (const r of toDelete) {
      await deleteDoc(doc(db, 'visits', r._id));
      trackIgnoredSources(r);
    }
    showReviewerToast(`${toDelete.length} record${toDelete.length!==1?'s':''} deleted ✓`, 'green');
    try { await deduplicateClusterLabs(cluster); } catch(e) { console.warn('Lab dedup failed:', e.message); }
    clusters.splice(_reviewerIdx, 1);
    if (_reviewerIdx >= clusters.length) _reviewerIdx = Math.max(0, clusters.length-1);
    if (clusters.length === 0) { $('reviewer-overlay').style.display = 'none'; return; }
    renderReviewer();
  } catch(e) { showReviewerToast(`Delete failed: ${e.message}`, 'red'); }
};

$('reviewer-commit').onclick = async () => {
  const merged = collectMergedRecord();
  if (!merged) return;
  const clusters = window._rolloverClusters||[];
  const cluster = clusters[_reviewerIdx];
  const primary = cluster[0];
  const secondaries = cluster.slice(1);
  if (!confirm(`Write merged record and delete ${secondaries.length} secondary record${secondaries.length!==1?'s':''}?\n\nReplaces Record A (${fmtDate(primary.date)}) with merged version.\n\nCannot be undone.`)) return;
  try {
    merged.mergedFrom = cluster.map(r=>r._id);
    merged.mergedAt = new Date().toISOString();
    const { _id, ...clean } = merged;
    await setDoc(doc(db, 'visits', primary._id), clean);
    for (const r of secondaries) {
      await deleteDoc(doc(db, 'visits', r._id));
      trackIgnoredSources(r);
    }
    showReviewerToast(`Merged ✓ — ${secondaries.length} record${secondaries.length!==1?'s':''} deleted`, 'green');
    try { await deduplicateClusterLabs(cluster); } catch(e) { console.warn('Lab dedup failed:', e.message); }
    clusters.splice(_reviewerIdx, 1);
    if (_reviewerIdx >= clusters.length) _reviewerIdx = Math.max(0, clusters.length-1);
    if (clusters.length === 0) {
      $('reviewer-overlay').style.display = 'none';
      maybeExportIgnoredSources();
      return;
    }
    renderReviewer();
  } catch(e) { showReviewerToast(`Write failed: ${e.message}`, 'red'); }
};

function trackIgnoredSources(record) {
  const files = [...(record.sourceFiles||[]), ...(record.driveFileIds||[])].filter(Boolean);
  for (const f of files) {
    if (!_ignoredSources.find(s => s.fileId === f)) {
      _ignoredSources.push({ fileId: f, filename: f, record: `${record.cat} ${fmtDate(record.date)}` });
    }
  }
}

async function maybeExportIgnoredSources() {
  if (!_ignoredSources.length) return;
  // Check which source files are still referenced elsewhere
  const allVisits = window._allVisits || [];
  const lines = ['Ignored source files from rollover review', '='.repeat(50), ''];
  for (const src of _ignoredSources) {
    const stillUsed = allVisits.filter(v =>
      v._id !== src.recordId &&
      ((v.sourceFiles||[]).includes(src.fileId) || (v.driveFileIds||[]).includes(src.fileId))
    ).length;
    const status = stillUsed > 0 ? `KEEP — still used in ${stillUsed} other record(s)` : 'SAFE TO REMOVE — not used elsewhere';
    lines.push(`${src.filename}`);
    lines.push(`  From: ${src.record}`);
    lines.push(`  Status: ${status}`);
    lines.push('');
  }
  const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ignored_sources.txt'; a.click();
  URL.revokeObjectURL(url);
}

function renderReviewer() {
  const clusters = window._rolloverClusters||[];
  if (!clusters.length) { $('reviewer-overlay').style.display = 'none'; return; }
  const cluster = clusters[_reviewerIdx];
  const primary = cluster[0]; // Record A — the primary to keep

  const dates = [...new Set(cluster.map(r=>r.date))].sort();
  const dateRange = dates.length === 1 ? fmtDate(dates[0]) : fmtDate(dates[0]) + ' – ' + fmtDate(dates[dates.length-1]);
  $('reviewer-title').textContent = `${primary.cat} · ${primary.clinic||'unknown clinic'} · ${dateRange} (${cluster.length} records)`;
  $('reviewer-counter').textContent = `${_reviewerIdx+1} of ${clusters.length}`;
  $('reviewer-prev').disabled = _reviewerIdx === 0;
  $('reviewer-next').disabled = _reviewerIdx === clusters.length-1;

  // Update delete-B button label
  $('reviewer-delete-b').textContent = cluster.length === 2
    ? 'Delete Record B (keep A only)'
    : `Delete Records B–${String.fromCharCode(64+cluster.length)} (keep A only)`;

  const body = $('reviewer-body');
  body.innerHTML = '';

  const fields = [
    { key: 'chiefComplaint', label: 'Chief Complaint', type: 'text' },
    { key: 'synopsis',       label: 'Synopsis',        type: 'textarea' },
    { key: 'narrative',      label: 'Narrative',       type: 'textarea', tall: true },
    { key: 'vitals',         label: 'Vitals',          type: 'vitals' },
  ];

  const fieldEls = {};

  for (const f of fields) {
    const vals = cluster.map(r => f.type === 'vitals' ? formatVitals(r.vitals) : (r[f.key] || ''));
    if (vals.every(v => !v)) continue;

    const sec = document.createElement('div');
    sec.style.cssText = 'margin-bottom:1.25rem;';
    const lbl = document.createElement('div');
    lbl.style.cssText = 'font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:0.5rem;font-weight:600;';
    lbl.textContent = f.label;
    sec.appendChild(lbl);

    // Radio cards — one per record in cluster
    const cols = Math.min(cluster.length, 3);
    const pickRow = document.createElement('div');
    pickRow.style.cssText = `display:grid;grid-template-columns:repeat(${cols},1fr);gap:0.5rem;margin-bottom:0.5rem;`;

    const makeOption = (recLabel, val, idx) => {
      const card = document.createElement('div');
      card.style.cssText = 'border:2px solid var(--border);border-radius:7px;padding:0.5rem 0.65rem;cursor:pointer;transition:all 0.15s;';
      const top = document.createElement('div');
      top.style.cssText = 'display:flex;align-items:center;gap:0.4rem;margin-bottom:0.3rem;';
      const radio = document.createElement('input');
      radio.type = 'radio';
      radio.name = `field-${f.key}`;
      radio.value = idx;
      radio.style.accentColor = 'var(--accent)';
      const lbl2 = document.createElement('label');
      lbl2.style.cssText = 'font-size:0.6rem;font-weight:600;color:var(--ink-muted);cursor:pointer;';
      lbl2.textContent = recLabel;
      top.appendChild(radio);
      top.appendChild(lbl2);
      const preview = document.createElement('div');
      preview.style.cssText = 'font-size:0.62rem;color:var(--ink-dim);line-height:1.5;max-height:4.5em;overflow:hidden;';
      preview.textContent = val || '(empty)';
      if (!val) preview.style.color = 'var(--ink-muted)';
      card.appendChild(top);
      card.appendChild(preview);
      const populate = () => {
        radio.checked = true;
        card.style.borderColor = 'var(--accent)';
        card.style.background = 'var(--surface)';
        pickRow.querySelectorAll('div[data-which]').forEach(c => {
          if (c !== card) { c.style.borderColor = 'var(--border)'; c.style.background = 'white'; }
        });
        if (fieldEls[f.key]) fieldEls[f.key].value = val;
      };
      card.dataset.which = idx;
      card.addEventListener('click', populate);
      radio.addEventListener('change', populate);
      return { card, populate, val };
    };

    const options = cluster.map((r, ri) =>
      makeOption(`Record ${String.fromCharCode(65+ri)} · ${fmtDate(r.date)}`, vals[ri], ri)
    );
    options.forEach(o => pickRow.appendChild(o.card));
    sec.appendChild(pickRow);

    let editEl;
    if (f.type === 'textarea' || f.type === 'vitals') {
      editEl = document.createElement('textarea');
      editEl.rows = f.tall ? 8 : 4;
    } else {
      editEl = document.createElement('input');
      editEl.type = 'text';
    }
    editEl.style.cssText = 'width:100%;font-family:"JetBrains Mono",monospace;font-size:0.68rem;border:1.5px solid var(--accent);border-radius:7px;padding:0.5rem 0.65rem;color:var(--ink);outline:none;resize:vertical;line-height:1.6;background:white;';
    editEl.placeholder = 'Select a record above, or type directly…';
    fieldEls[f.key] = editEl;

    // Auto-select: first record with content
    const firstWithContent = options.findIndex(o => o.val);
    if (firstWithContent >= 0) options[firstWithContent].populate();

    sec.appendChild(editEl);
    body.appendChild(sec);
  }

  // ── MEDICATIONS (union of all records) ──
  {
    let allMeds = (cluster[0].medications||[]).map(m=>({...m,_src:'A'}));
    for (let ri = 1; ri < cluster.length; ri++) {
      const label = String.fromCharCode(65+ri);
      const extras = unionItems(allMeds, (cluster[ri].medications||[]).map(m=>({...m,_src:label})), m=>(m.name||'').toLowerCase().replace(/\s+/g,''));
      allMeds = extras;
    }
    if (allMeds.length) {
      const sec = document.createElement('div');
      sec.style.cssText = 'margin-bottom:1.25rem;';
      sec.innerHTML = '<div style="font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:0.5rem;font-weight:600;">Medications</div>';
      const list = document.createElement('div');
      list.style.cssText = 'display:flex;flex-direction:column;gap:0.3rem;';
      allMeds.forEach((item, i) => {
        const row = document.createElement('label');
        row.style.cssText = 'display:flex;align-items:baseline;gap:0.5rem;padding:0.3rem 0.5rem;border-radius:5px;background:var(--surface);cursor:pointer;font-size:0.65rem;';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = true; cb.dataset.medIdx = i;
        cb.style.accentColor = 'var(--accent)';
        const src = document.createElement('span');
        src.style.cssText = 'font-size:0.55rem;color:var(--ink-muted);margin-left:auto;';
        src.textContent = item._src;
        row.appendChild(cb);
        row.appendChild(document.createTextNode((item.name||'—') + (item.dose?' · '+item.dose:'') + (item.frequency?' · '+item.frequency:'')));
        row.appendChild(src);
        list.appendChild(row);
      });
      sec.appendChild(list);
      sec.dataset.type = 'medications';
      sec._allMeds = allMeds;
      body.appendChild(sec);
    }
  }

  // ── PROCEDURES (union of all records) ──
  {
    let allProcs = (cluster[0].procedures||[]).map(p=>({...p,_src:'A'}));
    for (let ri = 1; ri < cluster.length; ri++) {
      const label = String.fromCharCode(65+ri);
      allProcs = unionItems(allProcs, (cluster[ri].procedures||[]).map(p=>({...p,_src:label})), p=>(p.name||'').toLowerCase().replace(/\s+/g,''));
    }
    if (allProcs.length) {
      const sec = document.createElement('div');
      sec.style.cssText = 'margin-bottom:1.25rem;';
      sec.innerHTML = '<div style="font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:0.5rem;font-weight:600;">Procedures</div>';
      const list = document.createElement('div');
      list.style.cssText = 'display:flex;flex-direction:column;gap:0.3rem;';
      allProcs.forEach((item, i) => {
        const row = document.createElement('label');
        row.style.cssText = 'display:flex;align-items:baseline;gap:0.5rem;padding:0.3rem 0.5rem;border-radius:5px;background:var(--surface);cursor:pointer;font-size:0.65rem;';
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = true; cb.dataset.procIdx = i;
        cb.style.accentColor = 'var(--accent)';
        const src = document.createElement('span');
        src.style.cssText = 'font-size:0.55rem;color:var(--ink-muted);margin-left:auto;';
        src.textContent = item._src;
        row.appendChild(cb);
        row.appendChild(document.createTextNode((item.name||'—') + (item.findings?' — '+item.findings:'')));
        row.appendChild(src);
        list.appendChild(row);
      });
      sec.appendChild(list);
      sec.dataset.type = 'procedures';
      sec._allProcs = allProcs;
      body.appendChild(sec);
    }
  }

  // ── LABS DIFF (across all records in cluster) ──
  buildLabsDiff(cluster, body);

  body._fieldEls = fieldEls;
  body._cluster = cluster;
}

function formatVitals(v) {
  if (!v || !Object.keys(v).length) return '';
  return Object.entries(v).filter(([,val])=>val!=null).map(([k,val])=>`${k}: ${val}`).join('\n');
}

function parseVitals(str) {
  const obj = {};
  for (const line of str.split('\n')) {
    const idx = line.indexOf(':');
    if (idx < 0) continue;
    const k = line.slice(0,idx).trim();
    const v = line.slice(idx+1).trim();
    if (k && v) obj[k] = v;
  }
  return obj;
}

function unionItems(listA, listB, keyFn) {
  const seen = new Map();
  for (const item of listA) {
    const k = keyFn(item);
    if (k) seen.set(k, { ...item, _src: 'A' });
  }
  for (const item of listB) {
    const k = keyFn(item);
    if (!seen.has(k)) seen.set(k, { ...item, _src: 'B' });
    else seen.get(k)._src = 'A+B'; // in both
  }
  return [...seen.values()];
}

async function buildLabsDiff(cluster, container) {
  // Load labs for both records from Firestore
  const sec = document.createElement('div');
  sec.style.cssText = 'margin-bottom:1.25rem;';
  sec.innerHTML = `<div style="font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:0.5rem;font-weight:600;">Labs</div>
    <div style="font-size:0.62rem;color:var(--ink-muted);font-style:italic;">Loading labs…</div>`;
  container.appendChild(sec);

  try {
    // Load labs for each record in cluster by driveFileId
    const labsByRecord = await Promise.all(cluster.map(async (r, ri) => {
      const ids = [...new Set([...(r.driveFileIds||[]), r.sourceFileId].filter(Boolean))];
      if (!ids.length) return [];
      const snap = await getDocs(query(collection(db, 'labs'), where('driveFileId', 'in', ids)));
      return snap.docs.map(d=>({_id:d.id,...d.data(),_recIdx:ri}));
    }));

    const allLabs = labsByRecord.flat();
    if (!allLabs.length) {
      sec.innerHTML = sec.innerHTML.replace('Loading labs…', 'No lab records found for this cluster.');
      return;
    }

    // Build unified test map — for each test, track value per record
    const testMap = new Map();
    for (const l of allLabs) {
      const k = (l.test||'').toLowerCase();
      if (!testMap.has(k)) testMap.set(k, { test: l.test, records: new Array(cluster.length).fill(null) });
      testMap.get(k).records[l._recIdx] = l;
    }

    const rows = [...testMap.values()].sort((x,y)=>(x.test||'').localeCompare(y.test||''));
    const isDup = row => {
      const vals = row.records.filter(Boolean).map(l=>String(l.value));
      return vals.length > 1 && vals.every(v=>v===vals[0]);
    };
    const dupCount = rows.filter(isDup).length;
    const uniqueCount = rows.length - dupCount;

    sec.innerHTML = `<div style="font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:0.5rem;font-weight:600;">Labs <span style="font-weight:400;font-style:italic;">(${dupCount} duplicates auto-resolved, ${uniqueCount} unique)</span></div>`;

    const table = document.createElement('table');
    const headerCells = cluster.map((_,ri)=>`<th>Record ${String.fromCharCode(65+ri)}</th>`).join('');
    table.innerHTML = `<tr><th>Test</th>${headerCells}<th>Action</th></tr>`;

    for (const row of rows) {
      const dup = isDup(row);
      const tr = document.createElement('tr');
      if (dup) tr.style.opacity = '0.5';
      const cells = row.records.map(l => {
        if (!l) return '<td style="font-size:0.62rem;color:var(--ink-muted);">—</td>';
        const val = `${l.value}${l.unit?' '+l.unit:''}${l.abnormal?' ['+l.abnormal+']':''}`;
        return `<td style="font-size:0.62rem;${l.abnormal?'color:var(--red);font-weight:600;':''}">${esc(val)}</td>`;
      }).join('');
      const presentIn = row.records.map((l,ri)=>l?String.fromCharCode(65+ri):null).filter(Boolean);
      const action = dup ? '✓ dup — keep one'
        : presentIn.length === 1 ? `${presentIn[0]} only — keep`
        : '⚠ diff values';
      tr.innerHTML = `<td style="font-size:0.62rem;">${esc(row.test||'—')}</td>${cells}<td style="font-size:0.6rem;color:var(--ink-muted);">${action}</td>`;
      table.appendChild(tr);
    }
    sec.appendChild(table);
    sec._labRows = rows;

  } catch(e) {
    sec.innerHTML = sec.innerHTML.replace('Loading labs…', `Could not load labs: ${esc(e.message)}`);
  }
}

function collectMergedRecord() {
  const body = $('reviewer-body');
  const fieldEls = body._fieldEls;
  const cluster = body._cluster;
  if (!cluster?.length) return null;
  const primary = cluster[0];

  // Base: start from primary record, overlay user selections
  const merged = { ...primary };

  // Text fields — use whatever the user typed/selected
  for (const [key, el] of Object.entries(fieldEls)) {
    if (el.value.trim()) {
      merged[key] = key === 'vitals' ? parseVitals(el.value) : el.value.trim();
    }
  }

  // Medications — checked items only
  const medSec = [...body.querySelectorAll('[data-type="medications"]')][0];
  if (medSec?._allMeds) {
    merged.medications = medSec._allMeds
      .filter((_, i) => medSec.querySelector(`[data-med-idx="${i}"]`)?.checked)
      .map(({ _src, ...item }) => item);
  }

  // Procedures — checked items only
  const procSec = [...body.querySelectorAll('[data-type="procedures"]')][0];
  if (procSec?._allProcs) {
    merged.procedures = procSec._allProcs
      .filter((_, i) => procSec.querySelector(`[data-proc-idx="${i}"]`)?.checked)
      .map(({ _src, ...item }) => item);
  }

  // Source files — union across all cluster records
  merged.sourceFiles = [...new Set(cluster.flatMap(r => r.sourceFiles||[]))];
  merged.driveFileIds = [...new Set(cluster.flatMap(r => r.driveFileIds||[]))];

  return merged;
}

function showReviewerToast(msg, color) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:1.5rem;right:1.5rem;z-index:2000;background:${color==='green'?'var(--green)':'var(--red)'};color:white;font-family:'JetBrains Mono',monospace;font-size:0.7rem;padding:0.5rem 0.85rem;border-radius:7px;box-shadow:0 4px 16px rgba(42,37,32,0.2);`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}

// Export ignored sources — also callable from a button
window.exportIgnoredSources = maybeExportIgnoredSources;
window.openRolloverReviewer = openRolloverReviewer;
</script>
