<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paw Records</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&family=Satisfy&display=swap');
:root {
  --bg:#f5f2ed; --surface:#edeae3; --surface2:#e4e0d8; --border:#d4cfc5;
  --accent:#7c6f5b; --accent2:#b8a990; --ink:#2a2520; --ink-dim:#6b6058; --ink-muted:#9e9288;
  --green:#4a7c59; --green-bg:#edf5f0; --amber:#9c6b1e; --amber-bg:#fdf5e6;
  --red:#c0242a; --red-bg:#fdf0f0; --blue:#0d47a1; --blue-bg:#eef3fa;
  --btn:#9e5a3a; --btn-hover:#8a4c30; --btn-text:#fff8f5;
  --btn-secondary:#e8d5c8; --btn-secondary-hover:#ddc5b4; --btn-secondary-ink:#6b3820;
  --btn-cost:#c0460e; --btn-cost-hover:#a33a0b; --btn-cost-bg:#fce9e1; --btn-cost-ink:#7a2d08;
  --btn-free:#3a7c52; --btn-free-hover:#2f6643; --btn-free-bg:#e4f2ea; --btn-free-ink:#1f4f32;
  --shadow:0 2px 12px rgba(42,37,32,0.08);
  --sidebar-w:260px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── SCREENS ── */
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden;}
.screen.active{display:flex;}

/* ── SIGN-IN ── */
#signin{align-items:center;justify-content:center;}
.signin-card{width:100%;max-width:400px;padding:2rem;text-align:center;}
.wordmark{font-family:'Satisfy',cursive;font-size:1.6rem;color:var(--accent);display:flex;align-items:center;justify-content:center;gap:0.45rem;margin-bottom:2.5rem;}
.wordmark-paw{font-size:1.3rem;line-height:1;}
.signin-card h1{font-family:'Instrument Serif',serif;font-size:1.35rem;font-weight:400;line-height:1.4;margin-bottom:0.75rem;color:var(--ink);}
.signin-card h1 em{font-style:italic;color:var(--accent);}
.signin-subtitle{color:var(--ink-muted);font-size:0.88rem;margin-bottom:2.5rem;line-height:1.65;text-align:center;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:0.75rem;width:100%;background:white;border:1.5px solid var(--border);border-radius:10px;padding:0.85rem 1.25rem;font-family:'Instrument Sans',sans-serif;font-size:0.92rem;font-weight:500;color:var(--ink);cursor:pointer;transition:all 0.2s;box-shadow:var(--shadow);}
.btn-google:hover{border-color:var(--accent);background:var(--surface);transform:translateY(-1px);box-shadow:0 4px 16px rgba(42,37,32,0.12);}
.btn-google:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-google svg{width:18px;height:18px;flex-shrink:0;}
.signin-error{margin-top:1rem;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--red);background:var(--red-bg);border:1px solid rgba(192,36,42,0.2);border-radius:7px;padding:0.6rem 0.85rem;display:none;text-align:left;line-height:1.6;}
.signin-error.show{display:block;}
.signin-note{margin-top:1.25rem;font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ink-muted);line-height:1.7;}

/* ── LOADING ── */
#loading{align-items:center;justify-content:center;}
.loading-card{text-align:center;}
.loading-wordmark{font-family:'Satisfy',cursive;font-size:1.15rem;color:var(--accent);display:flex;align-items:center;justify-content:center;gap:0.45rem;margin-bottom:1.75rem;}
.loading-dots{display:flex;gap:6px;justify-content:center;margin-bottom:0.85rem;}
.loading-dots span{width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:0.35;}30%{transform:translateY(-5px);opacity:1;}}
#loading-label{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink-muted);}

/* ── APP SHELL ── */
#app{flex-direction:row;}

/* Sidebar */
#sidebar{width:var(--sidebar-w);flex-shrink:0;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sidebar-top{padding:0.7rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:0.5rem;}
.sidebar-wordmark{font-family:'Instrument Serif',serif;font-size:0.92rem;color:var(--accent);white-space:nowrap;}
.sidebar-user{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--ink-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:right;}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-tab{flex:1;padding:0.55rem 0.25rem;font-family:'JetBrains Mono',monospace;font-size:0.58rem;letter-spacing:0.04em;text-transform:uppercase;color:var(--ink-muted);cursor:pointer;transition:all 0.15s;text-align:center;border-bottom:2px solid transparent;user-select:none;}
.sidebar-tab:hover{color:var(--ink);background:var(--surface);}
.sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.sidebar-panel{display:none;flex:1;overflow-y:auto;flex-direction:column;}
.sidebar-panel.active{display:flex;}
.sidebar-panel::-webkit-scrollbar{width:3px;}
.sidebar-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sidebar-empty{padding:2rem 1.25rem;font-family:'JetBrains Mono',monospace;font-size:0.67rem;color:var(--ink-muted);text-align:center;line-height:1.8;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.5rem;}
.sidebar-empty-icon{font-size:1.5rem;opacity:0.4;}

/* Records panel */
.cat-section{border-bottom:1px solid var(--surface2);}
.cat-heading{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 1rem;font-size:0.78rem;font-weight:600;color:var(--ink);cursor:pointer;transition:background 0.15s;user-select:none;}
.cat-heading:hover{background:var(--surface);}
.cat-emoji{font-size:0.9rem;}
.cat-arrow{font-size:0.5rem;color:var(--ink-muted);transition:transform 0.2s;margin-left:auto;}
.cat-heading.open .cat-arrow{transform:rotate(90deg);}
.visit-list{display:none;padding-bottom:0.25rem;}
.visit-list.open{display:block;}
.visit-date-group{margin-bottom:0.1rem;}
.visit-date-label{padding:0.3rem 1rem 0.2rem 1.5rem;font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--ink-dim);font-weight:500;}
.visit-entry{padding:0.18rem 1rem 0.18rem 2rem;cursor:pointer;transition:background 0.12s;display:flex;align-items:center;justify-content:space-between;gap:0.3rem;border-radius:4px;margin:0 0.25rem;}
.visit-entry:hover{background:var(--surface);}
.visit-entry-type{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--ink-muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.visit-entry:hover .visit-entry-type{color:var(--accent);}

/* Labs panel */
.lab-cat-section{border-bottom:1px solid var(--surface2);}
.lab-cat-heading{padding:0.5rem 1rem;font-size:0.78rem;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:0.5rem;user-select:none;transition:background 0.15s;}
.lab-cat-heading:hover{background:var(--surface);}
.lab-summary-row{display:flex;align-items:baseline;padding:0.2rem 1rem 0.2rem 1.5rem;gap:0.5rem;cursor:pointer;transition:background 0.1s;}
.lab-summary-row:hover{background:var(--surface);}
.lab-test-name{font-family:'JetBrains Mono',monospace;font-size:0.63rem;color:var(--ink-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lab-val{font-family:'JetBrains Mono',monospace;font-size:0.66rem;font-weight:600;flex-shrink:0;}
.lab-val.high{color:var(--red);}
.lab-val.low{color:var(--blue);}
.lab-val.neg{color:var(--ink-muted);font-weight:400;}
.lab-val.normal{color:var(--ink);}
.lab-date{font-family:'JetBrains Mono',monospace;font-size:0.56rem;color:var(--ink-muted);flex-shrink:0;}

/* Journal panel */
.journal-cat-section{border-bottom:1px solid var(--surface2);}
.journal-cat-heading{padding:0.5rem 1rem;font-size:0.78rem;font-weight:600;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:0.5rem;user-select:none;transition:background 0.15s;}
.journal-cat-heading:hover{background:var(--surface);}
.journal-list-name{padding:0.3rem 1rem 0.15rem 1.5rem;font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted);}
.journal-item{padding:0.2rem 1rem 0.2rem 1.75rem;font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ink-dim);line-height:1.5;display:flex;align-items:flex-start;gap:0.4rem;}
.journal-status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:0.3rem;}
.journal-status-dot.using{background:var(--green);}
.journal-status-dot.pending{background:var(--amber);}
.journal-status-dot.removed{background:var(--ink-muted);}
.journal-status-dot.considering{background:var(--blue);}

/* Files panel */
#files-panel{overflow-y:auto;}
.files-toolbar{padding:0.6rem 0.75rem;border-bottom:1px solid var(--border);display:flex;gap:0.4rem;flex-shrink:0;flex-wrap:wrap;}
.filter-btn{font-family:'JetBrains Mono',monospace;font-size:0.58rem;padding:0.25rem 0.5rem;border-radius:10px;border:1px solid var(--border);background:white;color:var(--ink-muted);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.file-item{padding:0.5rem 0.75rem;border-bottom:1px solid var(--surface2);cursor:pointer;transition:background 0.12s;display:flex;flex-direction:column;gap:0.2rem;}
.file-item:hover{background:var(--surface);}
.file-item-top{display:flex;align-items:center;gap:0.4rem;}
.file-ext-badge{font-family:'JetBrains Mono',monospace;font-size:0.55rem;padding:0.1rem 0.3rem;border-radius:3px;background:var(--surface2);color:var(--accent);text-transform:uppercase;flex-shrink:0;}
.file-name{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ink-dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-status-badge{font-family:'JetBrains Mono',monospace;font-size:0.55rem;padding:0.1rem 0.4rem;border-radius:10px;flex-shrink:0;white-space:nowrap;}
.file-status-badge.unprocessed{background:var(--amber-bg);color:var(--amber);}
.file-status-badge.queued{background:var(--blue-bg);color:var(--blue);}
.file-status-badge.processing{background:var(--surface2);color:var(--ink-dim);}
.file-status-badge.complete{background:var(--green-bg);color:var(--green);}
.file-status-badge.flagged{background:var(--red-bg);color:var(--red);}
.file-status-badge.failed{background:var(--red-bg);color:var(--red);}
.file-item-meta{display:flex;align-items:center;gap:0.5rem;font-family:'JetBrains Mono',monospace;font-size:0.56rem;color:var(--ink-muted);}
.file-cats{color:var(--accent);}
.files-loading{padding:1.5rem;font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink-muted);text-align:center;}
.files-connect-prompt{padding:1.25rem;display:flex;flex-direction:column;gap:0.75rem;}
.files-connect-prompt p{font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--ink-muted);line-height:1.6;}

/* ── MAIN AREA ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* Header */
.app-header{padding:0.65rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:white;box-shadow:0 1px 4px rgba(42,37,32,0.04);}
.app-header-left{display:flex;align-items:center;gap:0.75rem;}
.header-wordmark{font-family:'Instrument Serif',serif;font-size:0.95rem;color:var(--accent);}
.header-context{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--ink-muted);}
.app-header-right{display:flex;align-items:center;gap:0.4rem;}

/* Buttons */
.btn-icon{background:var(--btn-secondary);border:1px solid rgba(158,90,58,0.25);border-radius:7px;padding:0.35rem 0.6rem;font-family:'JetBrains Mono',monospace;font-size:0.63rem;letter-spacing:0.02em;color:var(--btn-secondary-ink);cursor:pointer;transition:all 0.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:0.3rem;}
.btn-icon:hover{background:var(--btn-secondary-hover);border-color:rgba(158,90,58,0.4);color:var(--btn-hover);}
.btn-icon:disabled{opacity:0.35;cursor:not-allowed;}
.btn-icon.cost-icon{background:var(--btn-cost-bg);border-color:rgba(192,70,14,0.3);color:var(--btn-cost-ink);}
.btn-icon.cost-icon:hover{background:var(--btn-cost);color:var(--btn-text);border-color:var(--btn-cost);}
.btn-icon.free-icon{background:var(--btn-free-bg);border-color:rgba(58,124,82,0.3);color:var(--btn-free-ink);}
.btn-icon.free-icon:hover{background:var(--btn-free);color:var(--btn-text);border-color:var(--btn-free);}
.btn-icon.danger{background:var(--red-bg);border-color:rgba(192,36,42,0.2);color:var(--red);}
.btn-icon.danger:hover{background:var(--red);color:white;border-color:var(--red);}
.cost-dot{width:5px;height:5px;border-radius:50%;background:var(--btn-cost);flex-shrink:0;}
.free-dot{width:5px;height:5px;border-radius:50%;background:var(--btn-free);flex-shrink:0;}

/* Chat */
.chat-body{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1.25rem;scroll-behavior:smooth;}
.chat-body::-webkit-scrollbar{width:4px;}
.chat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.chat-welcome{max-width:500px;margin:auto;text-align:center;padding:2rem 0;}
.chat-welcome h2{font-family:'Instrument Serif',serif;font-size:1.9rem;font-weight:400;margin-bottom:0.5rem;line-height:1.2;}
.chat-welcome h2 em{font-style:italic;color:var(--accent);}
.chat-welcome p{font-size:0.84rem;color:var(--ink-muted);line-height:1.7;margin-bottom:1.25rem;}
.chat-welcome-hints{display:flex;flex-direction:column;gap:0.4rem;text-align:left;}
.chat-hint{background:white;border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.85rem;font-size:0.8rem;color:var(--ink-dim);cursor:pointer;transition:all 0.15s;line-height:1.4;}
.chat-hint:hover{border-color:var(--accent);color:var(--ink);background:var(--surface);}
.msg{display:flex;gap:0.75rem;max-width:840px;animation:fadeUp 0.18s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-avatar{width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.55rem;font-family:'JetBrains Mono',monospace;flex-shrink:0;margin-top:2px;}
.msg.user .msg-avatar{background:var(--ink);color:var(--bg);}
.msg.assistant .msg-avatar{background:var(--surface2);border:1px solid var(--border);color:var(--ink-dim);}
.msg-bubble{padding:0.7rem 0.9rem;border-radius:10px;font-size:0.875rem;line-height:1.65;white-space:pre-wrap;}
.msg.user .msg-bubble{background:var(--ink);color:var(--bg);border-bottom-right-radius:3px;}
.msg.assistant .msg-bubble{background:white;border:1px solid var(--border);border-bottom-left-radius:3px;box-shadow:var(--shadow);}
.typing-indicator{display:flex;gap:4px;padding:0.35rem 0;align-items:center;}
.typing-indicator span{width:5px;height:5px;background:var(--ink-muted);border-radius:50%;animation:bounce 1.2s ease-in-out infinite;}
.typing-indicator span:nth-child(2){animation-delay:0.2s;}
.typing-indicator span:nth-child(3){animation-delay:0.4s;}

/* Chat input */
.chat-input-wrap{padding:0.75rem 1.25rem 0.85rem;border-top:1px solid var(--border);flex-shrink:0;background:white;}
.input-row{display:flex;gap:0.5rem;align-items:flex-end;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:0.45rem 0.55rem;transition:border-color 0.2s;}
.input-row:focus-within{border-color:var(--accent);}
#user-input{flex:1;background:transparent;border:none;color:var(--ink);font-family:'Instrument Sans',sans-serif;font-size:0.875rem;resize:none;outline:none;max-height:120px;line-height:1.5;padding:0.1rem 0;}
#user-input::placeholder{color:var(--ink-muted);}
#send-btn{background:var(--btn-cost);border:none;border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all 0.15s;color:white;}
#send-btn:hover{background:var(--btn-cost-hover);}
#send-btn:disabled{opacity:0.3;cursor:not-allowed;}
#send-btn svg{width:12px;height:12px;}
.input-hint{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--ink-muted);margin-top:0.35rem;text-align:center;}

/* Status bar */
.status-bar{padding:0.25rem 1rem;background:var(--surface);border-top:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--ink-muted);display:flex;align-items:center;gap:1rem;flex-shrink:0;}
.status-indicator{display:flex;align-items:center;gap:0.35rem;}
.status-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.status-dot.green{background:var(--green);}
.status-dot.amber{background:var(--amber);}
.status-dot.red{background:var(--red);}
.status-dot.grey{background:var(--ink-muted);}
.status-spacer{flex:1;}
.session-cost{color:var(--ink-muted);}
.session-cost.warning{color:var(--amber);}
.session-cost.alert{color:var(--red);}

/* Toast */
#toast-container{position:fixed;bottom:3rem;right:1.25rem;display:flex;flex-direction:column;gap:0.5rem;z-index:500;pointer-events:none;}
.toast{background:white;border:1px solid var(--border);border-radius:9px;padding:0.55rem 0.75rem;box-shadow:0 4px 16px rgba(42,37,32,0.12);font-family:'JetBrains Mono',monospace;font-size:0.67rem;color:var(--ink-dim);display:flex;align-items:center;gap:0.6rem;pointer-events:all;animation:slideIn 0.2s ease;max-width:280px;}
@keyframes slideIn{from{opacity:0;transform:translateX(10px);}to{opacity:1;transform:translateX(0);}}
.toast-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.toast-dot.green{background:var(--green);}
.toast-dot.amber{background:var(--amber);}
.toast-text{flex:1;line-height:1.4;}
.toast-undo{background:none;border:none;cursor:pointer;color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:0.62rem;padding:0.1rem 0.25rem;border-radius:4px;transition:all 0.15s;flex-shrink:0;}
.toast-undo:hover{background:var(--surface);color:var(--btn);}

/* API key modal */
#apikey-modal{display:none;position:fixed;inset:0;background:rgba(42,37,32,0.45);z-index:300;align-items:center;justify-content:center;padding:2rem;}
#apikey-modal.open{display:flex;}
.modal-box{background:white;border-radius:12px;width:100%;max-width:480px;box-shadow:0 8px 40px rgba(42,37,32,0.18);overflow:hidden;}
.modal-header{padding:0.85rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Instrument Serif',serif;font-size:1rem;color:var(--ink);}
.modal-close{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--ink-dim);display:flex;align-items:center;justify-content:center;font-size:0.8rem;transition:all 0.15s;}
.modal-close:hover{background:var(--surface2);color:var(--ink);}
.modal-body{padding:1.25rem;}
.modal-body label{display:block;font-family:'JetBrains Mono',monospace;font-size:0.63rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:0.4rem;}
.modal-body input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--ink);font-family:'JetBrains Mono',monospace;font-size:0.82rem;padding:0.65rem 0.85rem;outline:none;transition:border-color 0.2s;margin-bottom:0.75rem;}
.modal-body input:focus{border-color:var(--accent);}
.modal-note{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ink-muted);line-height:1.6;margin-bottom:1rem;}
.modal-footer{padding:0.85rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:0.5rem;}

/* Drive connect modal */
#drive-modal{display:none;position:fixed;inset:0;background:rgba(42,37,32,0.45);z-index:300;align-items:center;justify-content:center;padding:2rem;}
#drive-modal.open{display:flex;}

/* Scrollbar global */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
::-webkit-scrollbar-track{background:transparent;}

/* ── PROCESSING PIPELINE ── */

/* Process button row inside files panel */
.files-actions{padding:0.6rem 0.75rem;border-bottom:1px solid var(--border);display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;flex-shrink:0;}
.files-select-hint{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--ink-muted);flex:1;}

/* File item checkbox + selection state */
.file-item{position:relative;}
.file-item-checkbox{position:absolute;left:0.4rem;top:50%;transform:translateY(-50%);width:12px;height:12px;accent-color:var(--accent);cursor:pointer;opacity:0;transition:opacity 0.15s;}
.file-item:hover .file-item-checkbox,
.file-item.selected .file-item-checkbox{opacity:1;}
.file-item.selected{background:var(--surface);border-left:2px solid var(--accent);}
.file-item.processing-active .file-name{color:var(--accent);}

/* Processing modal */
#process-modal{display:none;position:fixed;inset:0;background:rgba(42,37,32,0.5);z-index:400;align-items:center;justify-content:center;padding:2rem;}
#process-modal.open{display:flex;}
.process-modal-box{background:white;border-radius:14px;width:100%;max-width:560px;box-shadow:0 10px 50px rgba(42,37,32,0.22);overflow:hidden;display:flex;flex-direction:column;}
.process-modal-header{padding:1rem 1.25rem 0.75rem;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;}
.process-modal-title{font-family:'Instrument Serif',serif;font-size:1.05rem;color:var(--ink);}
.process-modal-subtitle{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ink-muted);margin-top:0.15rem;line-height:1.5;}
.process-modal-body{padding:1.1rem 1.25rem;overflow-y:auto;max-height:380px;}
.process-mode-card{border-radius:9px;padding:0.85rem 1rem;margin-bottom:0.75rem;}
.process-mode-card.realtime{background:var(--green-bg);border:1px solid rgba(74,124,89,0.25);}
.process-mode-card.batch{background:var(--blue-bg);border:1px solid rgba(13,71,161,0.2);}
.process-mode-label{font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:600;margin-bottom:0.35rem;}
.process-mode-card.realtime .process-mode-label{color:var(--green);}
.process-mode-card.batch .process-mode-label{color:var(--blue);}
.process-mode-desc{font-family:'JetBrains Mono',monospace;font-size:0.65rem;color:var(--ink-dim);line-height:1.55;}
.process-cost-row{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0;border-top:1px solid var(--surface2);margin-top:0.5rem;}
.process-cost-label{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ink-dim);}
.process-cost-value{font-family:'JetBrains Mono',monospace;font-size:0.8rem;font-weight:600;color:var(--btn-cost);}
.process-file-list{margin-top:0.6rem;border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.process-file-row{display:flex;align-items:center;gap:0.5rem;padding:0.35rem 0.75rem;border-bottom:1px solid var(--surface2);font-family:'JetBrains Mono',monospace;font-size:0.61rem;}
.process-file-row:last-child{border-bottom:none;}
.process-file-row-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ink-dim);}
.process-file-row-ext{color:var(--accent);font-size:0.56rem;width:28px;flex-shrink:0;}
.process-file-row-size{color:var(--ink-muted);flex-shrink:0;}
.process-modal-footer{padding:0.85rem 1.25rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:0.5rem;flex-shrink:0;}
.process-cancel-note{font-family:'JetBrains Mono',monospace;font-size:0.57rem;color:var(--ink-muted);}

/* Active processing progress */
#process-progress{display:none;background:var(--surface);border-top:1px solid var(--border);padding:0.6rem 0.75rem;flex-shrink:0;}
#process-progress.active{display:block;}
.progress-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.35rem;}
.progress-label{font-family:'JetBrains Mono',monospace;font-size:0.63rem;color:var(--ink-dim);}
.progress-count{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--ink-muted);}
.progress-bar-wrap{background:var(--surface2);border-radius:4px;height:4px;overflow:hidden;}
.progress-bar{height:4px;background:var(--green);border-radius:4px;transition:width 0.4s ease;width:0%;}
.progress-current{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--ink-muted);margin-top:0.3rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.progress-stop-btn{font-size:0.57rem;padding:0.15rem 0.4rem;margin-left:0.5rem;cursor:pointer;background:var(--red-bg);border:1px solid rgba(192,36,42,0.2);color:var(--red);border-radius:4px;font-family:'JetBrains Mono',monospace;transition:all 0.15s;}
.progress-stop-btn:hover{background:var(--red);color:white;}

/* ── LAYER 3 ── */
#record-popup{display:none;position:fixed;inset:0;background:rgba(42,37,32,0.5);z-index:200;align-items:center;justify-content:center;padding:2rem;}
#record-popup.open{display:flex;}
.record-popup-box{background:white;border-radius:13px;width:100%;max-width:700px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 10px 50px rgba(42,37,32,0.2);overflow:hidden;}
.record-popup-header{padding:0.85rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:0.6rem;flex-shrink:0;flex-wrap:wrap;}
.record-popup-title{font-family:'Instrument Serif',serif;font-size:1rem;color:var(--ink);flex:1;min-width:0;}
.record-popup-meta{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--ink-muted);white-space:nowrap;}
.record-popup-search{display:flex;align-items:center;gap:0.3rem;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.2rem 0.5rem;transition:border-color 0.2s;}
.record-popup-search:focus-within{border-color:var(--accent);}
#popup-search-input{background:transparent;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--ink);width:110px;}
#popup-search-input::placeholder{color:var(--ink-muted);}
.popup-search-nav{background:none;border:none;cursor:pointer;color:var(--ink-muted);font-size:0.65rem;padding:0 0.1rem;transition:color 0.15s;line-height:1;}
.popup-search-nav:hover{color:var(--accent);}
#popup-search-count{font-family:'JetBrains Mono',monospace;font-size:0.62rem;color:var(--ink-muted);white-space:nowrap;min-width:40px;}
.record-popup-body{flex:1;overflow-y:auto;padding:1.1rem 1.25rem;font-family:'JetBrains Mono',monospace;font-size:0.75rem;line-height:1.75;color:var(--ink-dim);white-space:pre-wrap;word-break:break-word;}
.record-popup-body::-webkit-scrollbar{width:4px;}
.record-popup-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.record-popup-footer{padding:0.65rem 1.1rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.popup-footer-meta{font-family:'JetBrains Mono',monospace;font-size:0.6rem;color:var(--ink-muted);}
mark.sh{background:#fde68a;border-radius:2px;padding:0 1px;}
mark.sh.current{background:var(--btn);color:white;border-radius:2px;}
#pause-overlay{display:none;position:fixed;inset:0;background:rgba(42,37,32,0.58);z-index:500;align-items:center;justify-content:center;padding:2rem;}
#pause-overlay.open{display:flex;}
.pause-box{background:white;border-radius:14px;padding:2rem;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(42,37,32,0.2);}
.pause-icon{font-size:2rem;margin-bottom:0.75rem;}
.pause-title{font-family:'Instrument Serif',serif;font-size:1.3rem;margin-bottom:0.5rem;color:var(--ink);}
.pause-desc{font-size:0.83rem;color:var(--ink-muted);line-height:1.6;margin-bottom:1.25rem;}
.pause-file{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--ink-dim);background:var(--surface);border-radius:8px;padding:0.55rem 0.85rem;margin-bottom:1.25rem;word-break:break-all;}
.pause-continue-btn{width:100%;background:var(--green);color:white;border:none;border-radius:8px;font-family:'Instrument Sans',sans-serif;font-weight:600;font-size:0.95rem;padding:0.85rem;cursor:pointer;transition:background 0.15s;}
.pause-continue-btn:hover{background:var(--btn-free-hover);}
.journal-pending-section{border-bottom:1px solid var(--border);padding-bottom:0.5rem;margin-bottom:0.25rem;}
.journal-pending-header{padding:0.45rem 1rem 0.3rem;font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;justify-content:space-between;}
.journal-pending-item{padding:0.22rem 1rem 0.22rem 1.5rem;display:flex;align-items:center;gap:0.4rem;}
.journal-pending-text{font-family:'JetBrains Mono',monospace;font-size:0.61rem;color:var(--amber);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.journal-pending-dismiss{background:none;border:none;cursor:pointer;color:var(--ink-muted);font-size:0.7rem;padding:0.1rem 0.2rem;border-radius:3px;flex-shrink:0;transition:color 0.15s;}
.journal-pending-dismiss:hover{color:var(--red);}
.journal-group-label{padding:0.15rem 1rem 0.1rem 2.25rem;font-family:'JetBrains Mono',monospace;font-size:0.57rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-muted);margin-top:0.2rem;}
.journal-entry-full{padding:0.22rem 1rem 0.22rem 2.25rem;cursor:pointer;transition:background 0.12s;}
.journal-entry-full:hover{background:var(--surface);}
.journal-entry-text-full{font-family:'JetBrains Mono',monospace;font-size:0.61rem;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.journal-entry-full:hover .journal-entry-text-full{color:var(--accent);}
.journal-entry-date-full{font-family:'JetBrains Mono',monospace;font-size:0.56rem;color:var(--ink-muted);margin-top:0.05rem;}
.journal-list-count{background:var(--surface2);border-radius:10px;padding:0 0.35rem;font-size:0.58rem;color:var(--ink-muted);}
#chat-search-bar{display:none;padding:0.45rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;align-items:center;gap:0.5rem;}
#chat-search-bar.open{display:flex;}
#chat-search-input{flex:1;background:white;border:1.5px solid var(--border);border-radius:7px;padding:0.38rem 0.75rem;font-family:'JetBrains Mono',monospace;font-size:0.73rem;color:var(--ink);outline:none;transition:border-color 0.2s;}
#chat-search-input:focus{border-color:var(--accent);}
#chat-search-input::placeholder{color:var(--ink-muted);}
.chat-search-nav{background:var(--btn-secondary);border:1px solid rgba(158,90,58,0.25);border-radius:6px;padding:0.3rem 0.5rem;font-family:'JetBrains Mono',monospace;font-size:0.63rem;color:var(--btn-secondary-ink);cursor:pointer;transition:all 0.15s;}
.chat-search-nav:hover{background:var(--btn-secondary-hover);}
#chat-search-count{font-family:'JetBrains Mono',monospace;font-size:0.67rem;color:var(--ink-muted);white-space:nowrap;min-width:48px;}
#chat-search-close{background:none;border:none;cursor:pointer;color:var(--ink-muted);font-size:0.9rem;padding:0.15rem 0.3rem;transition:color 0.15s;}
#chat-search-close:hover{color:var(--ink);}
#abnormal-banner{display:none;padding:0.55rem 1.25rem;background:var(--red-bg);border-bottom:1px solid rgba(192,36,42,0.2);flex-shrink:0;align-items:center;gap:0.75rem;flex-wrap:wrap;}
#abnormal-banner.show{display:flex;}
#abnormal-banner-text{font-family:'JetBrains Mono',monospace;font-size:0.67rem;color:var(--red);flex:1;line-height:1.5;}
#abnormal-banner-close{background:none;border:none;cursor:pointer;color:var(--red);font-size:0.85rem;padding:0.1rem 0.3rem;opacity:0.6;transition:opacity 0.15s;flex-shrink:0;}
#abnormal-banner-close:hover{opacity:1;}
</head>
<body>

<!-- ══ SIGN-IN SCREEN ══ -->
<div id="signin" class="screen active">
  <div class="signin-card">
    <div class="wordmark"><span class="wordmark-paw">🐾</span>Paw Records</div>
    <h1>All your pets,<br><em>one place.</em></h1>
    <p class="signin-subtitle">Vet records, lab results, and care journals<br>for everyone you love.</p>
    <button class="btn-google" id="signin-btn">
      <!-- Google G logo -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <div class="signin-error" id="signin-error"></div>
    <p class="signin-note">Access is restricted to authorized accounts only.</p>
    <p style="font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--border);margin-top:1rem;">v0.2.0</p>
  </div>
</div>

<!-- ══ LOADING SCREEN ══ -->
<div id="loading" class="screen">
  <div class="loading-card">
    <div class="loading-wordmark"><span class="wordmark-paw">🐾</span>Paw Records</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <div id="loading-label">Signing in…</div>
  </div>
</div>

<!-- ══ APP SHELL ══ -->
<div id="app" class="screen">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-top">
      <span class="sidebar-wordmark">🐾 Paw Records</span>
      <span class="sidebar-user" id="sidebar-user-email"></span>
    </div>
    <div class="sidebar-tabs">
      <div class="sidebar-tab active" data-tab="records">Records</div>
      <div class="sidebar-tab" data-tab="labs">Labs</div>
      <div class="sidebar-tab" data-tab="journal">Journal</div>
      <div class="sidebar-tab" data-tab="files">Files</div>
    </div>

    <!-- Records Panel -->
    <div class="sidebar-panel active" id="panel-records">
      <div class="sidebar-empty" id="records-empty">
        <div class="sidebar-empty-icon">📋</div>
        <div>No records yet.<br>Process files to get started.</div>
      </div>
      <div id="records-tree"></div>
    </div>

    <!-- Labs Panel -->
    <div class="sidebar-panel" id="panel-labs">
      <div class="sidebar-empty" id="labs-empty">
        <div class="sidebar-empty-icon">🧪</div>
        <div>No lab results yet.</div>
      </div>
      <div id="labs-tree"></div>
    </div>

    <!-- Journal Panel -->
    <div class="sidebar-panel" id="panel-journal">
      <div class="sidebar-empty" id="journal-empty">
        <div class="sidebar-empty-icon">📓</div>
        <div>Journal is empty.<br>Start chatting to build it.</div>
      </div>
      <div id="journal-tree"></div>
    </div>

    <!-- Files Panel -->
    <div class="sidebar-panel" id="panel-files" style="overflow-y:auto;overflow-x:hidden;">
      <div class="files-toolbar" id="files-toolbar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="unprocessed">Unprocessed</button>
        <button class="filter-btn" data-filter="flagged">Flagged</button>
        <button class="filter-btn" data-filter="complete">Done</button>
      </div>
      <div class="files-actions" id="files-actions" style="display:none;">
        <button class="btn-icon cost-icon" id="process-selected-btn" style="display:none;">
          <span class="cost-dot"></span> Process Selected
        </button>
        <button class="btn-icon cost-icon" id="process-all-btn">
          <span class="cost-dot"></span> Process Unprocessed
        </button>
        <span class="files-select-hint" id="files-select-hint"></span>
      </div>
      <div id="process-progress">
        <div class="progress-header">
          <span class="progress-label" id="progress-label">Processing…</span>
          <span class="progress-count" id="progress-count"></span>
          <button class="progress-stop-btn" id="progress-stop-btn">Stop</button>
        </div>
        <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <div class="progress-current" id="progress-current"></div>
      </div>
      <div id="files-list">
        <div class="files-connect-prompt" id="drive-connect-prompt">
          <p>Connect Google Drive to access your <strong>PawRecords/uploads</strong> folder.</p>
          <button class="btn-icon free-icon" id="connect-drive-btn">
            <span class="free-dot"></span> Connect Drive
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MAIN AREA -->
  <div id="main">
    <div class="app-header">
      <div class="app-header-left">
        <span class="header-wordmark">Paw Records</span>
        <span class="header-context" id="header-context"></span>
      </div>
      <div class="app-header-right">
        <button class="btn-icon free-icon" id="chat-search-btn" title="Search conversation (Ctrl+F)">🔍</button>
        <button class="btn-icon free-icon" id="flags-btn" style="display:none">
          <span class="free-dot"></span> <span id="flags-count">0</span> Flagged
        </button>
        <button class="btn-icon cost-icon" id="save-session-btn" style="display:none" title="Save session highlights and journal entries to Firestore">
          <span class="cost-dot"></span> Save Session
        </button>
        <button class="btn-icon" id="apikey-btn" title="Set Anthropic API key">🔑 API Key</button>
        <button class="btn-icon danger" id="signout-btn">Sign Out</button>
      </div>
    </div>

    <!-- Abnormal lab banner -->
    <div id="abnormal-banner">
      <span id="abnormal-banner-text"></span>
      <button id="abnormal-banner-close">✕</button>
    </div>

    <!-- Chat search bar -->
    <div id="chat-search-bar">
      <input id="chat-search-input" placeholder="Search conversation…">
      <button class="chat-search-nav" id="chat-search-prev">▲</button>
      <button class="chat-search-nav" id="chat-search-next">▼</button>
      <span id="chat-search-count"></span>
      <button id="chat-search-close">✕</button>
    </div>

    <!-- Chat body -->
    <div class="chat-body" id="chat-body">
      <div class="chat-welcome" id="chat-welcome">
        <h2>Good to see you,<br><em>let's talk pets.</em></h2>
        <p id="welcome-subtitle">Ask about medications, lab trends, visit history, or anything on your mind. Your records are loaded and ready.</p>
        <div class="chat-welcome-hints">
          <div class="chat-hint" data-prompt="How has Mocha's BUN been trending over her recent visits?">How has Mocha's BUN been trending over her recent visits?</div>
          <div class="chat-hint" data-prompt="What's Evie currently on for medications?">What's Evie currently on for medications?</div>
          <div class="chat-hint" data-prompt="Summarize Latte's visit history for the past year.">Summarize Latte's visit history for the past year.</div>
        </div>
      </div>
    </div>

    <!-- Chat input -->
    <div class="chat-input-wrap">
      <div class="input-row">
        <textarea id="user-input" rows="1" placeholder="Ask anything about Mocha, Evie, or Latte…"></textarea>
        <button id="send-btn" disabled title="Send (costs tokens)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">⬆ send &nbsp;·&nbsp; shift+⬆ newline &nbsp;·&nbsp; <span style="color:var(--btn-cost)">●</span> costs tokens</div>
    </div>

    <!-- Status bar -->
    <div class="status-bar">
      <div class="status-indicator">
        <div class="status-dot grey" id="firebase-dot"></div>
        <span id="firebase-status">Connecting…</span>
      </div>
      <div class="status-indicator">
        <div class="status-dot grey" id="drive-dot"></div>
        <span id="drive-status">Drive not connected</span>
      </div>
      <div class="status-indicator">
        <div class="status-dot grey" id="apikey-dot"></div>
        <span id="apikey-status">No API key</span>
      </div>
      <div class="status-spacer"></div>
      <div class="session-cost" id="session-cost" style="display:none">Session: $0.00</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--border);">v0.2.0</div>
    </div>
  </div>
</div>

<!-- ══ TOAST CONTAINER ══ -->
<div id="toast-container"></div>

<!-- ══ RECORD POPUP ══ -->
<div id="record-popup">
  <div class="record-popup-box">
    <div class="record-popup-header">
      <div class="record-popup-title" id="popup-title"></div>
      <div class="record-popup-search">
        <input id="popup-search-input" placeholder="Search…">
        <button class="popup-search-nav" id="popup-prev">▲</button>
        <button class="popup-search-nav" id="popup-next">▼</button>
        <span id="popup-search-count"></span>
      </div>
      <button class="modal-close" id="popup-close">✕</button>
    </div>
    <div class="record-popup-body" id="popup-body"></div>
    <div class="record-popup-footer">
      <span class="popup-footer-meta" id="popup-drive-link"></span>
      <button class="btn-icon" id="popup-close-btn">Close</button>
    </div>
  </div>
</div>

<!-- ══ FIREBASE SDK ══ -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, addDoc, collection, getDocs, query, where, orderBy, limit }
  from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

// ── CONFIG ──
const firebaseConfig = {
  apiKey: "AIzaSyBECkOIkB_rbreDsTo44Kvwq0jL6f29cv0",
  authDomain: "pawrecords-1a8e6.firebaseapp.com",
  databaseURL: "https://pawrecords-1a8e6-default-rtdb.firebaseio.com",
  projectId: "pawrecords-1a8e6",
  storageBucket: "pawrecords-1a8e6.firebasestorage.app",
  messagingSenderId: "434841981751",
  appId: "1:434841981751:web:eb27c2ebb38920e9b040b2"
};

// Authorized emails — only these can sign in
const AUTHORIZED_EMAILS = [
  'kataragon@gmail.com',
  // Add husband's email here when known
];

// ── INIT ──
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();
provider.addScope('https://www.googleapis.com/auth/drive.readonly');

// Separate provider for Drive connection that forces token refresh
const driveProvider = new GoogleAuthProvider();
driveProvider.addScope('https://www.googleapis.com/auth/drive.readonly');
driveProvider.setCustomParameters({ prompt: 'consent' });

// ── STATE ──
let currentUser = null;
let apiKey = (() => { try { return localStorage.getItem('pr_apikey') || ''; } catch(e) { return ''; } })(); // pre-auth fallback; overwritten by loadApiKey() after sign-in
let driveAccessToken = null;
let sessionCost = 0;
let convHistory = [];
let pendingJournalItems = []; // queued during session, saved in batch

// ── HELPERS ──
const $ = id => document.getElementById(id);
const show = s => { document.querySelectorAll('.screen').forEach(el => el.classList.remove('active')); $(s).classList.add('active'); };
const setLoading = label => { $('loading-label').textContent = label; show('loading'); };

function showToast(text, type = 'info', undoFn = null) {
  const c = $('toast-container');
  const t = document.createElement('div');
  t.className = 'toast';
  const dotColor = type === 'journal' ? 'green' : type === 'warning' ? 'amber' : 'green';
  t.innerHTML = `<div class="toast-dot ${dotColor}"></div><div class="toast-text">${text}</div>`;
  if (undoFn) {
    const ub = document.createElement('button');
    ub.className = 'toast-undo';
    ub.textContent = 'Undo';
    ub.onclick = () => { undoFn(); t.remove(); };
    t.appendChild(ub);
  }
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 4000);
}

function updateStatusBar() {
  // Firebase
  if (currentUser) {
    $('firebase-dot').className = 'status-dot green';
    $('firebase-status').textContent = 'Firebase connected';
  }
  // API key
  if (apiKey) {
    $('apikey-dot').className = 'status-dot green';
    $('apikey-status').textContent = 'API key set';
    $('send-btn').disabled = false;
  } else {
    $('apikey-dot').className = 'status-dot amber';
    $('apikey-status').textContent = 'No API key';
    $('send-btn').disabled = true;
  }
  // Drive
  if (driveAccessToken) {
    $('drive-dot').className = 'status-dot green';
    $('drive-status').textContent = 'Drive connected';
  }
}

function updateSessionCost(tokensUsed) {
  // claude-sonnet-4: ~$3/M input, ~$15/M output — rough blended estimate
  const cost = (tokensUsed / 1000000) * 6;
  sessionCost += cost;
  const el = $('session-cost');
  el.style.display = 'block';
  el.textContent = `Session: $${sessionCost.toFixed(4)}`;
  el.className = 'session-cost' + (sessionCost > 1 ? ' alert' : sessionCost > 0.25 ? ' warning' : '');
}

// ── AUTH ──
$('signin-btn').addEventListener('click', async () => {
  $('signin-btn').disabled = true;
  $('signin-error').classList.remove('show');
  setLoading('Signing in with Google…');
  try {
    const result = await signInWithPopup(auth, provider);
    const user = result.user;
    // Check authorization
    if (AUTHORIZED_EMAILS.length > 0 && !AUTHORIZED_EMAILS.includes(user.email)) {
      await signOut(auth);
      show('signin');
      $('signin-btn').disabled = false;
      $('signin-error').textContent = `Access denied for ${user.email}. This app is private.`;
      $('signin-error').classList.add('show');
      return;
    }
    // Store drive token for later use
    const credential = GoogleAuthProvider.credentialFromResult(result);
    driveAccessToken = credential?.accessToken || null;
  } catch (err) {
    show('signin');
    $('signin-btn').disabled = false;
    $('signin-error').textContent = err.message || 'Sign in failed. Please try again.';
    $('signin-error').classList.add('show');
  }
});

$('signout-btn').addEventListener('click', async () => {
  await signOut(auth);
  sessionCost = 0;
  convHistory = [];
  pendingJournalItems = [];
  driveAccessToken = null;
  show('signin');
  $('signin-btn').disabled = false;
});

onAuthStateChanged(auth, async user => {
  if (user) {
    if (AUTHORIZED_EMAILS.length > 0 && !AUTHORIZED_EMAILS.includes(user.email)) {
      await signOut(auth);
      show('signin');
      return;
    }
    currentUser = user;
    setLoading('Loading your records…');
    $('sidebar-user-email').textContent = user.email;
    $('header-context').textContent = '';
    await loadApiKey();
    await loadInitialData();
    show('app');
  } else {
    currentUser = null;
    show('signin');
  }
});

// ── LOAD INITIAL DATA ──
async function loadInitialData() {
  try {
    setLoading('Loading records…');
    await loadRecordsSidebar();
    setLoading('Loading labs…');
    await loadLabsSidebar();
    setLoading('Loading journal…');
    await loadJournalSidebar();
    // Dynamic pet list for welcome message
    await updatePetList();
    // Check for recent abnormal lab values
    await checkAbnormalLabs();
    setLoading('Ready');
  } catch (err) {
    console.error('Load error:', err);
    showToast('Some data failed to load — check console', 'warning');
  }
}

async function updatePetList() {
  try {
    const snap = await getDocs(collection(db, 'visits'));
    const pets = [...new Set(snap.docs.map(d => d.data().cat).filter(Boolean))].sort();
    if (pets.length) {
      const list = pets.length === 1 ? pets[0]
        : pets.slice(0, -1).join(', ') + ' & ' + pets[pets.length - 1];
      $('welcome-subtitle').textContent =
        `Ask about medications, lab trends, visit history, or anything on your mind. Records loaded for ${list}.`;
      $('user-input').placeholder = `Ask anything about ${list}…`;
    }
  } catch(e) { /* non-critical, leave defaults */ }
}

// ── RECORDS SIDEBAR ──
async function loadRecordsSidebar() {
  try {
    const q = query(collection(db, 'visits'), orderBy('date', 'desc'));
    const snap = await getDocs(q);
    const tree = {}; // {cat: {date: [{id, clinic, doctor, chiefComplaint}]}}
    snap.forEach(d => {
      const v = d.data();
      if (!tree[v.cat]) tree[v.cat] = {};
      if (!tree[v.cat][v.date]) tree[v.cat][v.date] = [];
      tree[v.cat][v.date].push({id: d.id, ...v});
    });
    renderRecordsTree(tree);
  } catch (err) {
    console.error('Records load error:', err);
  }
}

function renderRecordsTree(tree) {
  const container = $('records-tree');
  const empty = $('records-empty');
  const cats = Object.keys(tree);
  if (!cats.length) { empty.style.display = 'flex'; container.innerHTML = ''; return; }
  empty.style.display = 'none';
  container.innerHTML = '';
  for (const cat of cats.sort()) {
    const dates = tree[cat];
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    const heading = document.createElement('div');
    heading.className = 'cat-heading open';
    heading.innerHTML = `<span class="cat-emoji">🐱</span><span>${cat}</span><span class="cat-arrow">▶</span>`;
    const vlist = document.createElement('div');
    vlist.className = 'visit-list open';
    for (const date of Object.keys(dates).sort().reverse()) {
      const visits = dates[date];
      const dg = document.createElement('div');
      dg.className = 'visit-date-group';
      const dl = document.createElement('div');
      dl.className = 'visit-date-label';
      dl.textContent = formatDate(date);
      dg.appendChild(dl);
      for (const v of visits) {
        const ve = document.createElement('div');
        ve.className = 'visit-entry';
        ve.innerHTML = `<span class="visit-entry-type">${v.clinic || v.docType || 'Visit'}</span>`;
        ve.onclick = () => openVisit(v);
        dg.appendChild(ve);
      }
      vlist.appendChild(dg);
    }
    heading.onclick = () => {
      heading.classList.toggle('open');
      vlist.classList.toggle('open');
    };
    sec.appendChild(heading);
    sec.appendChild(vlist);
    container.appendChild(sec);
  }
}

// ── LABS SIDEBAR ──
async function loadLabsSidebar() {
  try {
    const q = query(collection(db, 'labs'), orderBy('resultDate', 'desc'));
    const snap = await getDocs(q);
    // Group by cat, then test — keep most recent per test
    const bycat = {};
    snap.forEach(d => {
      const l = d.data();
      if (!bycat[l.cat]) bycat[l.cat] = {};
      if (!bycat[l.cat][l.test]) bycat[l.cat][l.test] = l; // first = most recent
    });
    renderLabsSidebar(bycat);
  } catch (err) {
    console.error('Labs load error:', err);
  }
}

function renderLabsSidebar(bycat) {
  const container = $('labs-tree');
  const empty = $('labs-empty');
  const cats = Object.keys(bycat);
  if (!cats.length) { empty.style.display = 'flex'; container.innerHTML = ''; return; }
  empty.style.display = 'none';
  container.innerHTML = '';
  for (const cat of cats.sort()) {
    const tests = bycat[cat];
    const sec = document.createElement('div');
    sec.className = 'lab-cat-section';
    const heading = document.createElement('div');
    heading.className = 'lab-cat-heading';
    heading.innerHTML = `<span>🐱</span><span>${cat}</span>`;
    sec.appendChild(heading);
    for (const [test, lab] of Object.entries(tests)) {
      const row = document.createElement('div');
      row.className = 'lab-summary-row';
      const abnClass = lab.abnormal === 'HIGH' ? 'high' : lab.abnormal === 'LOW' ? 'low' :
                       (lab.abnormal === 'NEG' || lab.abnormal === 'NEGATIVE') ? 'neg' : 'normal';
      row.innerHTML = `
        <span class="lab-test-name">${test}</span>
        <span class="lab-val ${abnClass}">${lab.value}${lab.unit ? ' ' + lab.unit : ''}</span>
        <span class="lab-date">${formatDateShort(lab.resultDate)}</span>`;
      sec.appendChild(row);
    }
    container.appendChild(sec);
  }
}

// ── JOURNAL SIDEBAR ──
async function loadJournalSidebar() {
  try {
    const q = query(collection(db, 'journal'), orderBy('cat'));
    const snap = await getDocs(q);
    const bycat = {};
    snap.forEach(d => {
      const j = d.data();
      if (!bycat[j.cat]) bycat[j.cat] = {};
      if (!bycat[j.cat][j.list]) bycat[j.cat][j.list] = [];
      bycat[j.cat][j.list].push(j);
    });
    renderJournalSidebar(bycat);
  } catch (err) {
    console.error('Journal load error:', err);
  }
}

function renderJournalSidebar(bycat) {
  const container = $('journal-tree');
  const empty = $('journal-empty');

  // Pending items section
  if (pendingJournalItems.length) {
    empty.style.display = 'none';
    let pending = container.querySelector('.journal-pending-section');
    if (!pending) { pending = document.createElement('div'); pending.className = 'journal-pending-section'; container.prepend(pending); }
    pending.innerHTML = `<div class="journal-pending-header"><span>⏳ Pending (${pendingJournalItems.length})</span><span style="font-size:0.58rem;color:var(--ink-muted);">Save Session to commit</span></div>`;
    for (const item of pendingJournalItems) {
      const el = document.createElement('div');
      el.className = 'journal-pending-item';
      el.innerHTML = `<span class="journal-pending-text" title="${escHtml(item.text)}">${escHtml(item.cat)}: ${escHtml(item.text.slice(0,32))}${item.text.length>32?'…':''}</span><button class="journal-pending-dismiss" title="Dismiss">✕</button>`;
      el.querySelector('button').addEventListener('click', () => {
        pendingJournalItems = pendingJournalItems.filter(i => i !== item);
        loadJournalSidebar();
      });
      pending.appendChild(el);
    }
  }

  const cats = Object.keys(bycat);
  if (!cats.length && !pendingJournalItems.length) { empty.style.display = 'flex'; container.innerHTML = ''; return; }
  empty.style.display = 'none';

  // Clear non-pending content
  container.querySelectorAll('.journal-cat-section').forEach(el => el.remove());

  for (const cat of cats.sort()) {
    const lists = bycat[cat];
    const sec = document.createElement('div');
    sec.className = 'journal-cat-section';
    const heading = document.createElement('div');
    heading.className = 'journal-cat-heading open';
    heading.innerHTML = `<span>🐱</span><span>${cat}</span><span class="cat-arrow">▶</span>`;
    const body = document.createElement('div');
    body.className = 'journal-cat-body open';
    heading.onclick = () => { heading.classList.toggle('open'); body.classList.toggle('open'); };
    sec.appendChild(heading);

    for (const [listName, items] of Object.entries(lists)) {
      if (!items.length) continue;
      const ls = document.createElement('div');
      ls.className = 'journal-list-section';
      const lh = document.createElement('div');
      lh.className = 'journal-list-heading';
      lh.innerHTML = `${listName} <span class="journal-list-count">${items.length}</span>`;
      const lb = document.createElement('div');
      lb.className = 'journal-list-body open';
      lh.onclick = () => lb.classList.toggle('open');

      // Group by status
      const groups = { current:[], plan:[], maybe:[], past:[] };
      for (const item of items) (groups[item.status] || groups.current).push(item);
      for (const [grp, grpItems] of Object.entries(groups)) {
        if (!grpItems.length) continue;
        const gl = document.createElement('div');
        gl.className = 'journal-group-label';
        gl.textContent = grp === 'current' ? '▸ Current' : grp === 'past' ? '▸ Past' : grp === 'plan' ? '▸ Planned' : '▸ Maybe';
        lb.appendChild(gl);
        for (const item of grpItems) {
          const ee = document.createElement('div');
          ee.className = 'journal-entry-full';
          ee.innerHTML = `<div class="journal-entry-text-full">${escHtml((item.text||'').slice(0,44))}${(item.text||'').length>44?'…':''}</div><div class="journal-entry-date-full">${item.startDate||''}${item.endDate?' → '+item.endDate:''}</div>`;
          lb.appendChild(ee);
        }
      }
      ls.appendChild(lh); ls.appendChild(lb); body.appendChild(ls);
    }
    sec.appendChild(body);
    container.appendChild(sec);
  }
}

async function loadDriveFiles() {
  const filesList = $('files-list');
  filesList.innerHTML = '<div class="files-loading">Loading files from Drive…</div>';
  try {
    // Find PawRecords folder first
    const pawRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name%3D'PawRecords'+and+mimeType%3D'application%2Fvnd.google-apps.folder'+and+trashed%3Dfalse&fields=files(id,name,parents)&includeItemsFromAllDrives=true&supportsAllDrives=true`,
      { headers: { Authorization: `Bearer ${driveAccessToken}` } }
    );
    const pawData = await pawRes.json();
    const pawFolder = pawData.files?.[0];
    if (!pawFolder) {
      filesList.innerHTML = '<div class="files-loading">Could not find PawRecords folder in My Drive. Check the folder name is exactly "PawRecords".</div>';
      return;
    }
    // Find uploads folder inside PawRecords
    const folderRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name%3D'uploads'+and+mimeType%3D'application%2Fvnd.google-apps.folder'+and+'${pawFolder.id}'+in+parents+and+trashed%3Dfalse&fields=files(id,name)`,
      { headers: { Authorization: `Bearer ${driveAccessToken}` } }
    );
    const folderData = await folderRes.json();
    const uploadFolder = folderData.files?.[0];
    if (!uploadFolder) {
      filesList.innerHTML = '<div class="files-loading">Found PawRecords but could not find uploads folder inside it.</div>';
      return;
    }
    // List files in that folder
    const filesRes = await fetch(
      `https://www.googleapis.com/drive/v3/files?q='${uploadFolder.id}'+in+parents+and+trashed%3Dfalse&fields=files(id,name,size,mimeType,modifiedTime)&pageSize=200&orderBy=name`,
      { headers: { Authorization: `Bearer ${driveAccessToken}` } }
    );
    const filesData = await filesRes.json();
    const driveFiles = filesData.files || [];
    // Load processing status from Firestore
    const statusMap = await loadFileStatuses(driveFiles.map(f => f.id));
    renderFilesList(driveFiles, statusMap);
  } catch (err) {
    console.error('Drive load error:', err);
    filesList.innerHTML = '<div class="files-loading">Error loading Drive files. Check console.</div>';
  }
}

async function loadFileStatuses(driveFileIds) {
  const map = {};
  if (!driveFileIds.length) return map;
  try {
    // Fetch in batches of 10 (Firestore 'in' limit)
    for (let i = 0; i < driveFileIds.length; i += 10) {
      const batch = driveFileIds.slice(i, i + 10);
      const q = query(collection(db, 'files'), where('driveFileId', 'in', batch));
      const snap = await getDocs(q);
      snap.forEach(d => { map[d.data().driveFileId] = d.data().status || 'unprocessed'; });
    }
  } catch(err) { console.error('Status load error:', err); }
  return map;
}

function renderFilesList(driveFiles, statusMap) {
  const filesList = $('files-list');
  if (!driveFiles.length) {
    filesList.innerHTML = '<div class="files-loading">No files found in PawRecords/uploads.</div>';
    return;
  }
  // Sort: unprocessed/flagged/failed first, then complete
  const priority = { unprocessed: 0, flagged: 1, failed: 2, processing: 3, queued: 4, complete: 5 };
  const sorted = [...driveFiles].sort((a, b) => {
    const sa = priority[statusMap[a.id] || 'unprocessed'] ?? 0;
    const sb = priority[statusMap[b.id] || 'unprocessed'] ?? 0;
    return sa - sb || a.name.localeCompare(b.name);
  });

  // Store globally for pipeline access
  window._driveFiles = sorted;
  window._statusMap = statusMap;

  filesList.innerHTML = '';
  const total = sorted.length;
  const unprocessed = sorted.filter(f => !statusMap[f.id] || statusMap[f.id] === 'unprocessed').length;
  const summary = document.createElement('div');
  summary.style.cssText = 'padding:0.5rem 0.75rem;font-family:JetBrains Mono,monospace;font-size:0.62rem;color:var(--ink-muted);border-bottom:1px solid var(--surface2);display:flex;align-items:center;justify-content:space-between;';
  summary.innerHTML = `<span>${total} files · ${unprocessed} unprocessed</span><span style="color:var(--accent);cursor:pointer;" id="select-all-link">select all</span>`;
  filesList.appendChild(summary);

  for (const file of sorted) {
    const status = statusMap[file.id] || 'unprocessed';
    const ext = file.name.split('.').pop().toUpperCase();
    const size = formatSize(file.size);
    const item = document.createElement('div');
    item.className = 'file-item';
    item.dataset.status = status;
    item.dataset.fileId = file.id;
    item.dataset.fileName = file.name;
    item.dataset.mimeType = file.mimeType || '';
    item.style.paddingLeft = '1.5rem';
    item.innerHTML = `
      <input type="checkbox" class="file-item-checkbox" data-file-id="${file.id}">
      <div class="file-item-top">
        <span class="file-ext-badge">${escHtml(ext)}</span>
        <span class="file-name" title="${escHtml(file.name)}">${escHtml(file.name)}</span>
        <span class="file-status-badge ${status}" id="badge-${file.id}">${status}</span>
      </div>
      <div class="file-item-meta">
        <span>${size}</span>
        <span class="file-cats" id="cats-${file.id}"></span>
        <a href="https://drive.google.com/file/d/${file.id}/view" target="_blank"
           style="color:var(--accent);text-decoration:none;margin-left:auto;" onclick="event.stopPropagation()">
          open ↗
        </a>
      </div>`;
    // Checkbox selection
    const cb = item.querySelector('.file-item-checkbox');
    cb.addEventListener('change', () => {
      item.classList.toggle('selected', cb.checked);
      updateProcessButtons();
    });
    item.addEventListener('click', e => {
      if (e.target === cb || e.target.tagName === 'A') return;
      cb.checked = !cb.checked;
      item.classList.toggle('selected', cb.checked);
      updateProcessButtons();
    });
    filesList.appendChild(item);
  }

  // Select all link
  setTimeout(() => {
    const sal = $('select-all-link');
    if (sal) sal.addEventListener('click', () => {
      const all = document.querySelectorAll('.file-item-checkbox');
      const anyUnchecked = [...all].some(cb => !cb.checked);
      all.forEach(cb => {
        cb.checked = anyUnchecked;
        cb.closest('.file-item').classList.toggle('selected', anyUnchecked);
      });
      updateProcessButtons();
    });
  }, 50);

  $('files-actions').style.display = 'flex';
  updateProcessButtons();
}

function estimateCost(files) {
  // Rough: ~2000 tokens input + ~500 output per file, sonnet pricing ~$3/$15 per M
  // Multi-pass: narrative + lab + PCR = ~3 passes per file
  const tokensPerFile = 6000;
  const totalTokens = files.length * tokensPerFile;
  const cost = (totalTokens / 1000000) * 9; // blended input/output
  return { cost, totalTokens };
}

async function startProcessingQueue(files) {
  if (!apiKey) { showToast('Set your API key first', 'warning'); return; }
  if (!driveAccessToken) { showToast('Connect Drive first', 'warning'); return; }
  processingStop = false;
  processingActive = true;
  processingQueue = [...files];
  await requestWakeLock();

  const progress = $('process-progress');
  progress.classList.add('active');
  $('process-all-btn').disabled = true;
  $('process-selected-btn').disabled = true;

  let done = 0;
  const total = files.length;
  let failed = 0;

  for (const file of files) {
    if (processingStop) break;
    updateProgress(done, total, `Processing: ${file.name}`);
    updateFileBadge(file.id, 'processing');
    try {
      await processFile(file);
      updateFileBadge(file.id, 'complete');
      done++;
      updateProgress(done, total, done < total ? `Done: ${file.name}` : 'All complete!');
    } catch (err) {
      console.error(`Failed: ${file.name}`, err);
      updateFileBadge(file.id, 'failed');
      await writeFileStatus(file.id, file.name, 'failed', { error: err.message });
      failed++;
      done++;
      showToast(`Failed: ${file.name.slice(0,30)} — ${err.message.slice(0,60)}`, 'warning');
    }
    // Throttle: brief pause between files to avoid rate limits
    if (done < total && !processingStop) await sleep(800);
  }

  processingActive = false;
  releaseWakeLock();
  $('process-all-btn').disabled = false;
  $('process-selected-btn').disabled = false;
  $('progress-label').textContent = processingStop ? 'Stopped' : 'Complete';
  $('progress-current').textContent = `${done - failed} succeeded · ${failed} failed`;

  // Reload sidebars with new data
  await loadRecordsSidebar();
  await loadLabsSidebar();
  await loadJournalSidebar();
  updateProcessButtons();

  const msg = processingStop
    ? `Stopped — ${done - failed} of ${total} files processed`
    : `Processed ${done - failed} files${failed ? ` · ${failed} failed` : ''} ✓`;
  showToast(msg, 'journal');

  setTimeout(() => { progress.classList.remove('active'); }, 8000);
}

function updateProgress(done, total, currentFile) {
  $('progress-count').textContent = `${done}/${total}`;
  $('progress-bar').style.width = total ? `${(done / total) * 100}%` : '0%';
  $('progress-current').textContent = currentFile;
}

// ── MAIN FILE PROCESSOR ──
async function processFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const mime = file.mimeType || '';

  // Mark as processing in Firestore
  await writeFileStatus(file.id, file.name, 'processing');

  let extractedText = null;
  let isImage = false;
  let imageBase64 = null;
  let imageMediaType = null;

  if (ext === 'xlsx' || ext === 'xls' || mime.includes('spreadsheet')) {
    // Excel: direct column mapping to labs — no AI needed
    await processExcelFile(file);
    return;
  } else if (['jpg','jpeg','png','gif','webp','tiff','tif'].includes(ext)) {
    // Image file: pass to Claude vision
    isImage = true;
    const blob = await fetchDriveFileBlob(file.id);
    imageBase64 = await blobToBase64(blob);
    imageMediaType = blob.type || `image/${ext === 'jpg' ? 'jpeg' : ext}`;
  } else if (ext === 'pdf' || mime === 'application/pdf') {
    // PDF: extract text via PDF.js
    const blob = await fetchDriveFileBlob(file.id);
    extractedText = await extractPdfText(blob);
    if (!extractedText || extractedText.trim().length < 50) {
      // Fallback: treat as image (scanned PDF) — render first page
      imageBase64 = await pdfPageToBase64(blob);
      imageMediaType = 'image/png';
      isImage = true;
      extractedText = null;
    }
  } else if (['txt','md','csv'].includes(ext)) {
    const blob = await fetchDriveFileBlob(file.id);
    extractedText = await blob.text();
  } else {
    // Unknown type — skip gracefully
    await writeFileStatus(file.id, file.name, 'complete', {
      flags: [{ type: 'unknown_type', description: `Unsupported file type: ${ext}` }]
    });
    return;
  }

  // ── SPLIT PASS: detect if this is a bulk summary that should be split ──
  let chunks = [{ text: extractedText, imageBase64, imageMediaType, isImage }];
  if (extractedText && extractedText.length > 3000) {
    const isBulkSummary = await detectBulkSummary(extractedText.slice(0, 2000));
    if (isBulkSummary) {
      const splitChunks = await splitByDate(extractedText);
      if (splitChunks.length > 1) {
        chunks = splitChunks.map(t => ({ text: t, isImage: false }));
      }
    }
  }

  const allVisits = [];
  const allLabs = [];
  const allFlags = [];
  const allCats = new Set();
  const allDates = new Set();
  const passes = [];

  for (const chunk of chunks) {
    if (processingStop) break;

    // ── NARRATIVE PASS ──
    const narrativeResult = await runNarrativePass(file, chunk);
    if (narrativeResult) {
      (narrativeResult.cats || []).forEach(c => allCats.add(c));
      (narrativeResult.dates || []).forEach(d => allDates.add(d));
      if (narrativeResult.visits?.length) allVisits.push(...narrativeResult.visits);
      if (narrativeResult.flags?.length) allFlags.push(...narrativeResult.flags);
      passes.push('narrative');
    }

    if (processingStop) break;

    // ── LAB PASS ──
    const labText = chunk.text || '';
    if (labText.length > 100 || chunk.isImage) {
      const labResult = await runLabPass(file, chunk, narrativeResult);
      if (labResult?.labs?.length) {
        allLabs.push(...labResult.labs);
        passes.push('labs');
      }
    }

    if (processingStop) break;

    // ── PCR PASS ──
    if (labText.toLowerCase().match(/\b(felv|fiv|pcr|giardia|corona|feline|detected|negative|positive)\b/)) {
      const pcrResult = await runPcrPass(file, chunk, narrativeResult);
      if (pcrResult?.results?.length) {
        allLabs.push(...pcrResult.results.map(r => ({ ...r, labName: 'PCR/Serology' })));
        passes.push('pcr');
      }
    }
  }

  // Write visits to Firestore
  for (const visit of allVisits) {
    if (!visit.cat || visit.cat === 'SKIP') continue;
    const visitRef = doc(collection(db, 'visits'));
    await setDoc(visitRef, {
      cat: visit.cat,
      date: visit.date || 'unknown',
      clinic: visit.clinic || null,
      doctor: visit.doctor || null,
      chiefComplaint: visit.chiefComplaint || null,
      diagnoses: visit.diagnoses || [],
      medications: visit.medications || [],
      procedures: visit.procedures || [],
      narrative: visit.narrative || '',
      sourceFiles: [file.name],
      driveFileIds: [file.id],
      visitCluster: `${visit.date || 'unknown'}_${(visit.clinic || 'unknown').toLowerCase().replace(/\s+/g,'_').slice(0,20)}`,
      confidence: visit.confidence || 0.8,
      flags: visit.flags || [],
      createdAt: new Date().toISOString()
    });
    if (visit.cat) allCats.add(visit.cat);
    if (visit.date) allDates.add(visit.date);
  }

  // Write labs to Firestore
  for (const lab of allLabs) {
    if (!lab.test || lab.value === undefined || lab.value === null) continue;
    const cat = lab.cat || (allCats.size === 1 ? [...allCats][0] : null);
    if (!cat) continue;
    const labRef = doc(collection(db, 'labs'));
    await setDoc(labRef, {
      cat,
      visitDate: lab.visitDate || lab.date || null,
      resultDate: lab.resultDate || lab.date || lab.visitDate || null,
      labName: lab.labName || null,
      test: lab.test,
      value: lab.value,
      unit: lab.unit || null,
      refLow: lab.refLow ?? null,
      refHigh: lab.refHigh ?? null,
      abnormal: lab.abnormal || null,
      sourceFile: file.name,
      driveFileId: file.id,
      visitCluster: lab.visitCluster || null,
      createdAt: new Date().toISOString()
    });
  }

  // Write flags to Firestore
  for (const flag of allFlags) {
    const flagRef = doc(collection(db, 'flags'));
    await setDoc(flagRef, {
      fileId: file.id,
      filename: file.name,
      type: flag.type || 'unclear_structure',
      description: flag.description || '',
      bestGuess: flag.bestGuess || null,
      options: flag.options || ['View original'],
      resolved: false,
      resolvedAt: null,
      resolution: null,
      createdAt: new Date().toISOString()
    });
  }

  // Final file status write
  const finalStatus = allFlags.length > 0 ? 'flagged' : 'complete';
  await writeFileStatus(file.id, file.name, finalStatus, {
    cats: [...allCats],
    datesCovered: [...allDates].sort(),
    extractionPasses: [...new Set(passes)],
    flags: allFlags.map(f => f.type),
    processedAt: new Date().toISOString()
  });

  // Update badge for cats found
  const catsEl = $(`cats-${file.id}`);
  if (catsEl && allCats.size) catsEl.textContent = [...allCats].join(', ');

  // Update flags button in header
  const flagCount = parseInt($('flags-count').textContent || '0') + allFlags.length;
  $('flags-count').textContent = flagCount;
  if (flagCount > 0) $('flags-btn').style.display = 'inline-flex';

  // Token cost tracking (rough: 8k tokens per file)
  updateSessionCost(8000);
}

// ── DRIVE FILE FETCH ──
async function fetchDriveFileBlob(fileId) {
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
    { headers: { Authorization: `Bearer ${driveAccessToken}` } }
  );
  if (!res.ok) throw new Error(`Drive fetch failed: ${res.status}`);
  return res.blob();
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// ── PDF TEXT EXTRACTION via PDF.js ──
let pdfjs = null;
async function getPdfJs() {
  if (pdfjs) return pdfjs;
  // Load PDF.js from CDN
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  document.head.appendChild(script);
  await new Promise((r, j) => { script.onload = r; script.onerror = j; });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  pdfjs = window.pdfjsLib;
  return pdfjs;
}

async function extractPdfText(blob) {
  try {
    const lib = await getPdfJs();
    const arrayBuffer = await blob.arrayBuffer();
    const pdf = await lib.getDocument({ data: arrayBuffer }).promise;
    let text = '';
    const maxPages = Math.min(pdf.numPages, 60);
    for (let i = 1; i <= maxPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join(' ');
      text += pageText + '\n';
    }
    return text.trim();
  } catch (err) {
    console.warn('PDF.js extraction failed:', err);
    return '';
  }
}

async function pdfPageToBase64(blob) {
  try {
    const lib = await getPdfJs();
    const arrayBuffer = await blob.arrayBuffer();
    const pdf = await lib.getDocument({ data: arrayBuffer }).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
    return canvas.toDataURL('image/png').split(',')[1];
  } catch (err) {
    console.warn('PDF page render failed:', err);
    return null;
  }
}

// ── CLAUDE EXTRACTION PASSES ──

const SYSTEM_EXTRACTION = `You are a veterinary medical records parser. Extract structured data from vet records.
Rules:
- Cat names: Mocha, Evie, Latte (or detect new names)
- Invoices: extract ONLY meds dispensed, vaccines, prescription foods, procedures + dates. Discard all costs/billing. If none of those → respond {skip:true}
- Bulk clinical summaries: IGNORE any summary/problem list header block at the top. Extract ONLY individual dated visit entries
- Discard boilerplate: portal instructions, legal text, appointment reminders
- Multi-cat files: produce separate records per cat
- Every extraction must include confidence (0-1) and flags for uncertain items
- Dates: YYYY-MM-DD format. If uncertain, your best guess with low confidence
- Always respond with ONLY valid JSON, no markdown fences, no extra text`;

async function callExtractionClaude(messages, maxTokens = 2000) {
  if (!apiKey) throw new Error('No API key');
  await throttleCheck();
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      system: SYSTEM_EXTRACTION,
      messages
    })
  });

  if (res.status === 529 || res.status === 429) {
    // Rate limited — exponential backoff then pause overlay
    const retryAfter = parseInt(res.headers?.get?.('retry-after') || '30');
    const wait = Math.min(retryAfter, 60) * 1000;
    $('progress-current').textContent = `Rate limited — waiting ${Math.round(wait/1000)}s…`;
    await sleep(wait);
    // Second attempt
    const res2 = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:maxTokens,system:SYSTEM_EXTRACTION,messages})
    });
    if (res2.status === 429 || res2.status === 529) {
      // Still rate limited — show pause overlay, wait for user
      showPauseOverlay($('progress-current').textContent);
      await waitForResume();
      bucketReset = Date.now(); bucketUsed = 0;
      return callExtractionClaude(messages, maxTokens);
    }
    if (!res2.ok) { const e2 = await res2.json().catch(()=>({})); throw new Error(e2?.error?.message||`API ${res2.status}`); }
    const d2 = await res2.json();
    try { return JSON.parse(d2.content.map(b=>b.text||'').join('').trim().replace(/^```json\n?|^```\n?|```$/gm,'').trim()); } catch { return null; }
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API ${res.status}`);
  }
  const data = await res.json();
  const raw = data.content.map(b => b.text || '').join('').trim();
  try {
    return JSON.parse(raw.replace(/^```json\n?|^```\n?|```$/gm, '').trim());
  } catch {
    console.warn('JSON parse failed, raw:', raw.slice(0,200));
    return null;
  }
}

function buildUserContent(chunk, promptText) {
  if (chunk.isImage && chunk.imageBase64) {
    return [
      { type: 'image', source: { type: 'base64', media_type: chunk.imageMediaType || 'image/jpeg', data: chunk.imageBase64 } },
      { type: 'text', text: promptText }
    ];
  }
  return promptText + '\n\n' + (chunk.text || '').slice(0, 12000);
}

async function detectBulkSummary(textSnippet) {
  // Heuristic: bulk summaries often have a dense problem list or multiple dates in header
  const hasMultipleDates = (textSnippet.match(/\d{4}-\d{2}-\d{2}|\d{1,2}\/\d{1,2}\/\d{2,4}/g) || []).length > 3;
  const hasProblemList = /problem list|active diagnoses|current medications|visit history/i.test(textSnippet);
  return hasMultipleDates && hasProblemList;
}

async function splitByDate(fullText) {
  // Simple heuristic split by date headers before AI processing
  const datePattern = /(?:^|\n)(?:Date of Service|Visit Date|DOS|Date):\s*(\d{1,2}\/\d{1,2}\/\d{2,4}|\d{4}-\d{2}-\d{2})/gi;
  const splits = [];
  let lastIdx = 0;
  let match;
  while ((match = datePattern.exec(fullText)) !== null) {
    if (match.index > lastIdx + 100) {
      splits.push(fullText.slice(lastIdx, match.index));
      lastIdx = match.index;
    }
  }
  splits.push(fullText.slice(lastIdx));
  return splits.filter(s => s.trim().length > 100);
}
