let bucketReset = Date.now(), bucketUsed = 0;
const BUCKET_LIMIT = 22000, TOKENS_PER_CALL = 2200;
let pauseResolver = null;

async function throttleCheck() {
  const now = Date.now();
  if (now - bucketReset > 60000) { bucketReset = now; bucketUsed = 0; }
  bucketUsed += TOKENS_PER_CALL;
  if (bucketUsed > BUCKET_LIMIT) {
    const waitMs = 62000 - (Date.now() - bucketReset);
    await showThrottleCountdown(Math.ceil(waitMs/1000));
    bucketReset = Date.now(); bucketUsed = TOKENS_PER_CALL;
  }
}
async function showThrottleCountdown(secs) {
  for (let i = secs; i > 0; i--) {
    $('progress-current').textContent = `Rate limit \u2014 cooling down ${i}s\u2026`;
    await sleep(1000);
  }
}

// ── JOURNAL — Claude-powered (Haiku, background) ──
let pendingJournalItems = [];
const mentionTally = {};

async function extractJournalFromConversation(userMsg, assistantMsg) {
  if (!apiKey) return;
  try {
    const jSnap = await getDocs(collection(db, 'journal'));
    const journalLines = [];
    jSnap.forEach(d => {
      const j = d.data();
      journalLines.push(`${j.cat} / ${j.list} [${j.status}]: ${j.text}${j.dose ? ' \u2014 '+j.dose : ''}`);
    });
    const journalContext = journalLines.length ? journalLines.join('\n') : '(empty)';
    const today = new Date().toISOString().split('T')[0];

    const prompt = `You are a veterinary care journal extractor for cats Mocha, Evie, and Latte.
Analyze this conversation and extract loggable care information.
Return ONLY valid JSON, no markdown:
{"entries":[{"cat":"Mocha|Evie|Latte","list":"Medications|Foods|Supplements|Symptoms|Plans|Procedures|Weight Log","status":"current|past|plan|maybe","text":"terse factual text","startDate":"YYYY-MM-DD","endDate":"YYYY-MM-DD or null","updateOf":"existing entry text or null","updateNote":"what changed or null"}],"mentions":[{"cat":"cat or all","term":"item mentioned","context":"brief note"}]}
Status: current=actively receiving, past=stopped, plan=intending, maybe=speculation. Single neutral mention goes in mentions only. Return empty arrays if nothing to log. Be conservative.
Existing journal:\n${journalContext}\nUser: ${userMsg}\nAssistant: ${assistantMsg.slice(0,400)}`;

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,system:'Return only valid JSON.',messages:[{role:'user',content:prompt}]})
    });
    if (!res.ok) return;
    const data = await res.json();
    const parsed = JSON.parse(data.content.map(b=>b.text||'').join('').trim().replace(/```json|```/g,'').trim());
    applyJournalExtraction(parsed, today);
  } catch(e) { console.warn('Journal extraction (non-critical):', e.message); }
}

function applyJournalExtraction(data, date) {
  for (const e of (data.entries || [])) {
    if (!e.cat || !e.text) continue;
    const item = { id:Math.random().toString(36).slice(2,9), cat:e.cat, list:e.list||'General', text:e.text, status:e.status||'current', startDate:e.startDate||date, endDate:e.endDate||null, addedDate:date };
    pendingJournalItems.push(item);
    const undo = () => { pendingJournalItems = pendingJournalItems.filter(i=>i!==item); loadJournalSidebar(); };
    showToast(`Journal: ${e.cat} \u00b7 ${e.text.slice(0,28)}${e.status==='maybe'?' (maybe)':e.status==='plan'?' (plan)':''}`, 'journal', undo);
  }
  for (const m of (data.mentions || [])) {
    const cats = m.cat === 'all' ? ['Mocha','Evie','Latte'] : [m.cat];
    for (const cat of cats) {
      const key = `${cat}_${(m.term||'').toLowerCase()}`;
      mentionTally[key] = (mentionTally[key]||0) + 1;
      if (mentionTally[key] === 2) {
        const item = {id:Math.random().toString(36).slice(2,9),cat,list:'Maybe',text:m.term,status:'maybe',startDate:date,addedDate:date};
        pendingJournalItems.push(item);
        showToast(`Journal: ${cat} \u00b7 ${m.term} \u2192 maybe (mentioned twice)`,'journal');
      }
    }
  }
  if (pendingJournalItems.length) { loadJournalSidebar(); $('save-session-btn').style.display='inline-flex'; }
}

      await setDoc(doc(collection(db,'journal')), {
        cat:item.cat, list:item.list||'General', text:item.text,
        dose:item.dose||null, status:item.status||'current',
        startDate:item.startDate||today, endDate:item.endDate||null,
        addedDate:today, updatedDate:today, updates:[]
      });
    }
    pendingJournalItems = [];
    await loadJournalSidebar();
    updateSessionCost(2000);
    showToast(`Session saved \u2014 ${(extracted.highlights||[]).length} highlights, ${allItems.length} journal entries`,'journal');
  } catch(err) {
    console.error('Save session error:', err);
    showToast('Save failed \u2014 '+err.message,'warning');
  }
  $('save-session-btn').disabled = false;
  $('save-session-btn').innerHTML = '<span class="cost-dot"></span> Save Session';
});

// ── API KEY MODAL ──
async function loadApiKey() {
  // Try Firestore first (persists across devices)
  if (currentUser) {
    try {
      const snap = await getDoc(doc(db, 'settings', currentUser.uid));
      if (snap.exists() && snap.data().anthropicKey) {
        apiKey = snap.data().anthropicKey;
        updateStatusBar();
        return;
      }
    } catch(e) { console.warn('Firestore key load failed:', e); }
  }
  // Fallback to localStorage
  try { apiKey = localStorage.getItem('pr_apikey') || ''; } catch(e) {}
  updateStatusBar();
}

async function saveApiKey(key) {
  // Save to Firestore (primary)
  if (currentUser) {
    try {
      await setDoc(doc(db, 'settings', currentUser.uid), { anthropicKey: key }, { merge: true });
    } catch(e) {
      console.warn('Firestore key save failed, using localStorage:', e);
      try { localStorage.setItem('pr_apikey', key); } catch(e2) {}
    }
  } else {
    // Not signed in yet — localStorage only
    try { localStorage.setItem('pr_apikey', key); } catch(e) {}
  }
  // Always keep in localStorage as backup
  try { localStorage.setItem('pr_apikey', key); } catch(e) {}
}

$('apikey-btn').addEventListener('click', () => {
  const inp = $('apikey-input');
  inp.value = apiKey;
  inp.type = 'text';
  $('apikey-toggle').textContent = 'hide';
  $('apikey-status-msg').textContent = apiKey ? '✓ Key loaded from your account' : '';
  $('apikey-modal').classList.add('open');
  setTimeout(() => { inp.focus(); inp.select(); }, 50);
});

$('apikey-modal-close').addEventListener('click', () => $('apikey-modal').classList.remove('open'));
$('apikey-cancel-btn').addEventListener('click', () => $('apikey-modal').classList.remove('open'));

$('apikey-toggle').addEventListener('click', () => {
  const inp = $('apikey-input');
  if (inp.type === 'text') { inp.type = 'password'; $('apikey-toggle').textContent = 'show'; }
  else { inp.type = 'text'; $('apikey-toggle').textContent = 'hide'; }
});

// Live validation feedback as user types/pastes
$('apikey-input').addEventListener('input', () => {
  const val = $('apikey-input').value.trim();
  const msg = $('apikey-status-msg');
  if (!val) { msg.textContent = ''; return; }
  if (val.length < 20) { msg.style.color = 'var(--amber)'; msg.textContent = 'Key looks too short…'; return; }
  msg.style.color = 'var(--green)'; msg.textContent = '✓ Looks good — click Save to Account';
});

$('apikey-save-btn').addEventListener('click', async () => {
  const key = $('apikey-input').value.trim();
  const msg = $('apikey-status-msg');
  if (!key) { msg.style.color = 'var(--red)'; msg.textContent = 'Paste your key from console.anthropic.com first'; return; }
  if (key.length < 20) { msg.style.color = 'var(--red)'; msg.textContent = 'That key looks too short — copy it again'; return; }
  $('apikey-save-btn').disabled = true;
  $('apikey-save-btn').innerHTML = '<span class="cost-dot"></span> Saving…';
  apiKey = key;
  await saveApiKey(key);
  $('apikey-save-btn').disabled = false;
  $('apikey-save-btn').innerHTML = '<span class="cost-dot"></span> Save to Account';
  $('apikey-modal').classList.remove('open');
  updateStatusBar();
  showToast('API key saved to your account ✓', 'journal');
});

$('apikey-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('apikey-save-btn').click();
});

// ── UTILITIES ──
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(d) {
  if (!d) return 'Unknown date';
  try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return d; }
}
function formatDateShort(d) {
  if (!d) return '';
  try { return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
  catch { return d; }
}
function formatSize(bytes) {
  if (!bytes) return '';
  if (bytes < 1024) return bytes + 'b';
  if (bytes < 1048576) return Math.round(bytes / 1024) + 'k';
  return (bytes / 1048576).toFixed(1) + 'mb';
}

// Initialize API key status
updateStatusBar();
</script>
