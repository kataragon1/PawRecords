name: Bump version on deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'index.html'

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in version.json
        run: |
          VERSION=$(node -e "const v=require('./version.json').version.split('.');v[2]=parseInt(v[2])+1;console.log(v.join('.'))")
          echo "{\"version\":\"$VERSION\"}" > version.json
          echo "Bumped to $VERSION"

      - name: Commit version.json only
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "v$(node -e "console.log(require('./version.json').version)") [skip ci]"
          git push
