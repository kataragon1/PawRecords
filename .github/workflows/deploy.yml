name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        id: version
        run: |
          # Read current version
          VERSION=$(cat version.txt | tr -d '[:space:]')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          # Increment patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo $NEW_VERSION > version.txt
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped $VERSION → $NEW_VERSION"

      - name: Inject version into index.html
        run: |
          VERSION=${{ steps.version.outputs.version }}
          # Replace any vX.X.X pattern in the two known locations
          sed -i "s/v[0-9]\+\.[0-9]\+\.[0-9]\+/v$VERSION/g" index.html
          echo "Injected v$VERSION into index.html"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt index.html
          git commit -m "chore: bump version to v${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        # If you're using the simple "Deploy from branch" setup in Pages settings
        # rather than the Actions deployment method, remove this step and the
        # permissions block above — the git push above will trigger Pages automatically.
